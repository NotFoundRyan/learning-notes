<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态机可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        .container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .state-diagram {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 250px;
            position: relative;
        }
        .state {
            position: absolute;
            width: 100px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            cursor: pointer;
            border: 3px solid #333;
            background: #fff;
        }
        .state.active {
            background: #333;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .state.start {
            border-color: #2ecc71;
        }
        .state.start::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            border: 10px solid transparent;
            border-right-color: #2ecc71;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: 2px solid #333;
            background: transparent;
            color: #333;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            min-width: 100px;
        }
        .btn:hover {
            background: #333;
            color: #fff;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .event-log {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: #f8f8f2;
        }
        .event-log .event {
            padding: 4px 0;
            border-bottom: 1px solid #444;
        }
        .event-log .event:last-child {
            border-bottom: none;
        }
        .event-log .time {
            color: #75715e;
        }
        .event-log .state-name {
            color: #66d9ef;
        }
        .event-log .event-name {
            color: #a6e22e;
        }
        .current-state {
            text-align: center;
            padding: 16px;
            background: #f8f8f8;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .current-state-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .current-state-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .transition-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .transition-table th,
        .transition-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .transition-table th {
            background: #f8f8f8;
            font-weight: bold;
        }
        .transition-table td.highlight {
            background: #fff3cd;
        }
        .explanation {
            padding: 16px;
            background: #fff;
            border-left: 4px solid #333;
            border-radius: 0 8px 8px 0;
            margin-top: 16px;
        }
        .explanation h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .explanation p {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
        .animation-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        .speed-btn {
            padding: 8px 16px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .speed-btn:hover {
            background: #f0f0f0;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .arrow {
            stroke: #333;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }
        .arrow.highlight {
            stroke: #e74c3c;
            stroke-width: 3;
        }
        .arrow-label {
            font-size: 11px;
            fill: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>状态机可视化</h1>
        
        <div class="current-state">
            <div class="current-state-label">当前状态</div>
            <div class="current-state-value" id="currentState">IDLE</div>
        </div>
        
        <div class="state-diagram" id="stateDiagram">
            <svg id="svgCanvas">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
                    </marker>
                </defs>
            </svg>
            <div class="state start" id="state-idle" style="left: 50px; top: 100px;">IDLE</div>
            <div class="state" id="state-running" style="left: 250px; top: 50px;">RUNNING</div>
            <div class="state" id="state-paused" style="left: 250px; top: 150px;">PAUSED</div>
            <div class="state" id="state-stopped" style="left: 450px; top: 100px;">STOPPED</div>
        </div>
        
        <div class="controls">
            <button class="btn" id="btnStart">START</button>
            <button class="btn" id="btnPause" disabled>PAUSE</button>
            <button class="btn" id="btnResume" disabled>RESUME</button>
            <button class="btn" id="btnStop" disabled>STOP</button>
            <button class="btn" id="btnReset">RESET</button>
        </div>
        
        <table class="transition-table">
            <thead>
                <tr>
                    <th>当前状态</th>
                    <th>事件</th>
                    <th>下一状态</th>
                </tr>
            </thead>
            <tbody id="transitionBody">
                <tr>
                    <td>IDLE</td>
                    <td>START</td>
                    <td>RUNNING</td>
                </tr>
                <tr>
                    <td>RUNNING</td>
                    <td>PAUSE</td>
                    <td>PAUSED</td>
                </tr>
                <tr>
                    <td>PAUSED</td>
                    <td>RESUME</td>
                    <td>RUNNING</td>
                </tr>
                <tr>
                    <td>RUNNING</td>
                    <td>STOP</td>
                    <td>STOPPED</td>
                </tr>
                <tr>
                    <td>PAUSED</td>
                    <td>STOP</td>
                    <td>STOPPED</td>
                </tr>
                <tr>
                    <td>STOPPED</td>
                    <td>RESET</td>
                    <td>IDLE</td>
                </tr>
            </tbody>
        </table>
        
        <div class="event-log" id="eventLog">
            <div class="event">
                <span class="time">[00:00:00]</span> 系统初始化，当前状态: <span class="state-name">IDLE</span>
            </div>
        </div>
        
        <div class="explanation">
            <h3>状态机说明</h3>
            <p>这是一个简单的任务状态机示例。状态机由状态（圆角矩形）、事件（按钮）和转换（箭头）组成。点击事件按钮触发状态转换，观察状态变化过程。</p>
        </div>
        
        <div class="animation-controls">
            <button class="speed-btn" id="autoPlay">▶ 自动演示</button>
            <button class="speed-btn" id="clearLog">清除日志</button>
        </div>
    </div>

    <script>
        const states = {
            IDLE: {
                transitions: { START: 'RUNNING' },
                position: { x: 100, y: 130 }
            },
            RUNNING: {
                transitions: { PAUSE: 'PAUSED', STOP: 'STOPPED' },
                position: { x: 300, y: 80 }
            },
            PAUSED: {
                transitions: { RESUME: 'RUNNING', STOP: 'STOPPED' },
                position: { x: 300, y: 180 }
            },
            STOPPED: {
                transitions: { RESET: 'IDLE' },
                position: { x: 500, y: 130 }
            }
        };
        
        let currentState = 'IDLE';
        let autoPlayInterval = null;
        
        const stateElements = {
            IDLE: document.getElementById('state-idle'),
            RUNNING: document.getElementById('state-running'),
            PAUSED: document.getElementById('state-paused'),
            STOPPED: document.getElementById('state-stopped')
        };
        
        const buttons = {
            START: document.getElementById('btnStart'),
            PAUSE: document.getElementById('btnPause'),
            RESUME: document.getElementById('btnResume'),
            STOP: document.getElementById('btnStop'),
            RESET: document.getElementById('btnReset')
        };
        
        function updateUI() {
            document.getElementById('currentState').textContent = currentState;
            
            Object.keys(stateElements).forEach(state => {
                stateElements[state].classList.toggle('active', state === currentState);
            });
            
            Object.keys(buttons).forEach(event => {
                const state = states[currentState];
                buttons[event].disabled = !state.transitions[event];
            });
            
            highlightTransitionTable();
        }
        
        function highlightTransitionTable() {
            const rows = document.querySelectorAll('#transitionBody tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells[0].textContent === currentState) {
                    row.classList.add('highlight');
                } else {
                    row.classList.remove('highlight');
                }
            });
        }
        
        function addLog(event, fromState, toState) {
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            const log = document.getElementById('eventLog');
            const entry = document.createElement('div');
            entry.className = 'event';
            entry.innerHTML = `<span class="time">[${time}]</span> 事件: <span class="event-name">${event}</span>, ${fromState} → <span class="state-name">${toState}</span>`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        function transition(event) {
            const state = states[currentState];
            const nextState = state.transitions[event];
            
            if (nextState) {
                addLog(event, currentState, nextState);
                currentState = nextState;
                updateUI();
            }
        }
        
        Object.keys(buttons).forEach(event => {
            buttons[event].addEventListener('click', () => transition(event));
        });
        
        document.getElementById('autoPlay').addEventListener('click', function() {
            if (autoPlayInterval) {
                clearInterval(autoPlayInterval);
                autoPlayInterval = null;
                this.textContent = '▶ 自动演示';
            } else {
                const sequence = ['START', 'PAUSE', 'RESUME', 'STOP', 'RESET'];
                let idx = 0;
                
                autoPlayInterval = setInterval(() => {
                    if (buttons[sequence[idx]] && !buttons[sequence[idx]].disabled) {
                        transition(sequence[idx]);
                    }
                    idx = (idx + 1) % sequence.length;
                }, 1500);
                this.textContent = '⏸ 暂停';
            }
        });
        
        document.getElementById('clearLog').addEventListener('click', () => {
            document.getElementById('eventLog').innerHTML = '';
        });
        
        updateUI();
        
        // 自动开始播放
        const sequence = ['START', 'PAUSE', 'RESUME', 'STOP', 'RESET'];
        let seqIdx = 0;
        autoPlayInterval = setInterval(() => {
            if (buttons[sequence[seqIdx]] && !buttons[sequence[seqIdx]].disabled) {
                transition(sequence[seqIdx]);
            }
            seqIdx = (seqIdx + 1) % sequence.length;
        }, 1500);
        document.getElementById('autoPlay').textContent = '⏸ 暂停';
    </script>
</body>
</html>
