<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态机演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #f5576c;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .state-diagram {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
            gap: 20px;
        }
        
        .state-node {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid #ddd;
        }
        
        .state-node.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            transform: scale(1.1);
            border-color: transparent;
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.4);
        }
        
        .state-node strong {
            font-size: 16px;
        }
        
        .state-node small {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        .arrow {
            font-size: 28px;
            color: #f5576c;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .log-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .log-entry {
            padding: 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            animation: fadeIn 0.3s ease;
        }
        
        .log-entry.state {
            background: #fff3e0;
            border-left: 3px solid #ff9800;
        }
        
        .log-entry.event {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
        }
        
        .log-entry.action {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .current-state {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
        }
        
        .current-state h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .current-state .state-name {
            font-size: 32px;
            font-weight: bold;
        }
        
        .transition-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .transition-table th,
        .transition-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .transition-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #f5576c;
        }
        
        .transition-table tr:hover {
            background: #f8f9fa;
        }
        
        .led-indicator {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        
        .led-indicator.on {
            background: #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }
        
        .led-indicator.blink {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { background: #4caf50; box-shadow: 0 0 20px rgba(76, 175, 80, 0.6); }
            50% { background: #ddd; box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 状态机演示</h1>
        
        <div class="card">
            <h2>系统状态图</h2>
            <div class="state-diagram">
                <div class="state-node active" id="state-idle" onclick="handleEvent('START')">
                    <strong>IDLE</strong>
                    <small>空闲</small>
                </div>
                <div class="arrow">→</div>
                <div class="state-node" id="state-running" onclick="handleEvent('STOP')">
                    <strong>RUNNING</strong>
                    <small>运行中</small>
                </div>
                <div class="arrow">→</div>
                <div class="state-node" id="state-paused" onclick="handleEvent('RESUME')">
                    <strong>PAUSED</strong>
                    <small>暂停</small>
                </div>
                <div class="arrow">→</div>
                <div class="state-node" id="state-error" onclick="handleEvent('RESET')">
                    <strong>ERROR</strong>
                    <small>错误</small>
                </div>
            </div>
            
            <div class="current-state">
                <h3>当前状态</h3>
                <div class="state-name" id="currentStateName">IDLE</div>
            </div>
            
            <div class="button-group">
                <button onclick="handleEvent('START')" id="btn-start">启动</button>
                <button onclick="handleEvent('STOP')" id="btn-stop" disabled>停止</button>
                <button onclick="handleEvent('PAUSE')" id="btn-pause" disabled>暂停</button>
                <button onclick="handleEvent('RESUME')" id="btn-resume" disabled>恢复</button>
                <button onclick="handleEvent('ERROR')" id="btn-error">触发错误</button>
                <button onclick="handleEvent('RESET')" id="btn-reset" disabled>复位</button>
            </div>
            
            <div class="log-container" id="stateLog">
                <div class="log-entry state">状态机初始化完成，当前状态: IDLE</div>
            </div>
        </div>
        
        <div class="card">
            <h2>LED 状态机</h2>
            <div style="text-align: center; padding: 30px;">
                <div class="led-indicator" id="led"></div>
                <p style="margin-top: 15px; color: #666;" id="ledStatus">LED 关闭</p>
            </div>
            <div class="button-group">
                <button onclick="ledSetState('OFF')">关闭</button>
                <button onclick="ledSetState('ON')">打开</button>
                <button onclick="ledSetState('BLINK_SLOW')">慢闪</button>
                <button onclick="ledSetState('BLINK_FAST')">快闪</button>
            </div>
        </div>
        
        <div class="card">
            <h2>状态转换表</h2>
            <table class="transition-table">
                <thead>
                    <tr>
                        <th>当前状态</th>
                        <th>事件</th>
                        <th>下一状态</th>
                        <th>动作</th>
                    </tr>
                </thead>
                <tbody id="transitionTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 状态定义
        const STATES = {
            IDLE: 'IDLE',
            RUNNING: 'RUNNING',
            PAUSED: 'PAUSED',
            ERROR: 'ERROR'
        };
        
        // 事件定义
        const EVENTS = {
            START: 'START',
            STOP: 'STOP',
            PAUSE: 'PAUSE',
            RESUME: 'RESUME',
            ERROR: 'ERROR',
            RESET: 'RESET'
        };
        
        // 状态转换表
        const TRANSITIONS = [
            { current: STATES.IDLE, event: EVENTS.START, next: STATES.RUNNING, action: '启动系统' },
            { current: STATES.IDLE, event: EVENTS.ERROR, next: STATES.ERROR, action: '进入错误状态' },
            { current: STATES.RUNNING, event: EVENTS.STOP, next: STATES.IDLE, action: '停止系统' },
            { current: STATES.RUNNING, event: EVENTS.PAUSE, next: STATES.PAUSED, action: '暂停系统' },
            { current: STATES.RUNNING, event: EVENTS.ERROR, next: STATES.ERROR, action: '紧急停止' },
            { current: STATES.PAUSED, event: EVENTS.RESUME, next: STATES.RUNNING, action: '恢复系统' },
            { current: STATES.PAUSED, event: EVENTS.STOP, next: STATES.IDLE, action: '停止系统' },
            { current: STATES.ERROR, event: EVENTS.RESET, next: STATES.IDLE, action: '系统复位' }
        ];
        
        let currentState = STATES.IDLE;
        
        // 日志函数
        function log(message, type = 'state') {
            const container = document.getElementById('stateLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            container.insertBefore(entry, container.firstChild);
            
            while (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }
        
        // 更新UI
        function updateUI() {
            // 更新状态节点
            document.querySelectorAll('.state-node').forEach(node => {
                node.classList.remove('active');
            });
            document.getElementById(`state-${currentState.toLowerCase()}`).classList.add('active');
            
            // 更新当前状态显示
            document.getElementById('currentStateName').textContent = currentState;
            
            // 更新按钮状态
            const buttons = {
                'btn-start': currentState === STATES.IDLE,
                'btn-stop': currentState === STATES.RUNNING || currentState === STATES.PAUSED,
                'btn-pause': currentState === STATES.RUNNING,
                'btn-resume': currentState === STATES.PAUSED,
                'btn-error': currentState !== STATES.ERROR,
                'btn-reset': currentState === STATES.ERROR
            };
            
            for (const [id, enabled] of Object.entries(buttons)) {
                document.getElementById(id).disabled = !enabled;
            }
        }
        
        // 处理事件
        function handleEvent(event) {
            log(`事件: ${event}`, 'event');
            
            // 查找转换
            const transition = TRANSITIONS.find(t => 
                t.current === currentState && t.event === event
            );
            
            if (transition) {
                log(`状态转换: ${currentState} → ${transition.next}`, 'state');
                log(`执行动作: ${transition.action}`, 'action');
                
                currentState = transition.next;
                updateUI();
            } else {
                log(`无效事件: ${event} 在状态 ${currentState}`, 'state');
            }
        }
        
        // LED 状态机
        const LED_STATES = {
            OFF: 'OFF',
            ON: 'ON',
            BLINK_SLOW: 'BLINK_SLOW',
            BLINK_FAST: 'BLINK_FAST'
        };
        
        let ledState = LED_STATES.OFF;
        let ledBlinkInterval = null;
        
        function ledSetState(state) {
            const led = document.getElementById('led');
            const status = document.getElementById('ledStatus');
            
            // 清除之前的闪烁
            if (ledBlinkInterval) {
                clearInterval(ledBlinkInterval);
                ledBlinkInterval = null;
            }
            
            ledState = state;
            
            switch (state) {
                case LED_STATES.OFF:
                    led.className = 'led-indicator';
                    status.textContent = 'LED 关闭';
                    break;
                    
                case LED_STATES.ON:
                    led.className = 'led-indicator on';
                    status.textContent = 'LED 打开';
                    break;
                    
                case LED_STATES.BLINK_SLOW:
                    led.className = 'led-indicator blink';
                    led.style.animationDuration = '1s';
                    status.textContent = 'LED 慢闪';
                    break;
                    
                case LED_STATES.BLINK_FAST:
                    led.className = 'led-indicator blink';
                    led.style.animationDuration = '0.2s';
                    status.textContent = 'LED 快闪';
                    break;
            }
        }
        
        // 初始化转换表
        function initTransitionTable() {
            const tbody = document.getElementById('transitionTable');
            TRANSITIONS.forEach(t => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${t.current}</td>
                    <td>${t.event}</td>
                    <td>${t.next}</td>
                    <td>${t.action}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 初始化
        updateUI();
        initTransitionTable();
    </script>
</body>
</html>
