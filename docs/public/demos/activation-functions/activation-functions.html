<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活函数可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 2%; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #333; margin-bottom: 1%; font-size: clamp(14px, 2vw, 24px); }
        .func-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 1%; }
        .func-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .func-dot.active { background: #333; transform: scale(1.2); }
        .tabs { display: flex; justify-content: center; gap: 6px; margin-bottom: 1%; flex-wrap: wrap; }
        .tab { padding: 6px 12px; border: 2px solid #333; border-radius: 6px; background: white; color: #333; font-size: clamp(10px, 1.2vw, 14px); font-weight: 500; transition: all 0.2s ease; }
        .tab.active { background: #333; color: white; }
        .canvas-container { flex: 1; min-height: 0; background: white; border-radius: 8px; padding: 1%; margin-bottom: 1%; }
        canvas { width: 100%; height: 100%; display: block; }
        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1%; margin-bottom: 1%; }
        @media (max-width: 600px) { .info-grid { grid-template-columns: repeat(2, 1fr); } }
        .info-item { background: #f8f9fa; padding: 1.5%; border-radius: 8px; border-left: 3px solid #333; }
        .info-label { font-size: clamp(9px, 1vw, 12px); color: #666; margin-bottom: 0.5%; }
        .info-value { font-size: clamp(11px, 1.2vw, 14px); font-weight: bold; color: #333; font-family: 'Courier New', monospace; }
        .formula-box { background: #f8f9fa; padding: 1.5%; border-radius: 8px; margin-bottom: 1%; text-align: center; font-family: 'Times New Roman', serif; font-size: clamp(12px, 1.5vw, 18px); }
        .explanation { padding: 1.5%; background: #fff; border-left: 4px solid #333; border-radius: 0 8px 8px 0; }
        .explanation h3 { color: #333; margin-bottom: 0.5%; font-size: clamp(12px, 1.3vw, 14px); }
        .explanation p { color: #666; font-size: clamp(10px, 1.2vw, 13px); line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>激活函数可视化</h1>
        <div class="func-indicator" id="funcIndicator"></div>
        <div class="tabs" id="tabsContainer"></div>
        <div class="canvas-container"><canvas id="activationCanvas"></canvas></div>
        <div class="formula-box" id="formulaBox">σ(x) = 1 / (1 + e<sup>-x</sup>)</div>
        <div class="info-grid">
            <div class="info-item"><div class="info-label">输出范围</div><div class="info-value" id="outputRangeValue">(0, 1)</div></div>
            <div class="info-item"><div class="info-label">导数范围</div><div class="info-value" id="derivativeRangeValue">(0, 0.25]</div></div>
            <div class="info-item"><div class="info-label">零中心</div><div class="info-value" id="zeroCentered">否</div></div>
            <div class="info-item"><div class="info-label">梯度消失</div><div class="info-value" id="vanishingGradient">严重</div></div>
        </div>
        <div class="explanation" id="explanation"><h3>Sigmoid</h3><p>输出有界，适合概率输出。但梯度消失问题严重，输出非零中心影响收敛。推荐用于二分类问题的输出层。</p></div>
    </div>
    <script>
        const canvas = document.getElementById('activationCanvas');
        const ctx = canvas.getContext('2d');
        const activations = {
            sigmoid: { name: 'Sigmoid', func: x => 1 / (1 + Math.exp(-x)), derivative: x => { const s = 1 / (1 + Math.exp(-x)); return s * (1 - s); }, formula: 'σ(x) = 1 / (1 + e<sup>-x</sup>)', outputRange: '(0, 1)', derivativeRange: '(0, 0.25]', zeroCentered: '否', vanishingGradient: '严重', desc: '输出有界，适合概率输出。但梯度消失问题严重，输出非零中心影响收敛。推荐用于二分类问题的输出层。', color: '#3498db' },
            tanh: { name: 'Tanh', func: x => Math.tanh(x), derivative: x => 1 - Math.pow(Math.tanh(x), 2), formula: 'tanh(x) = (e<sup>x</sup> - e<sup>-x</sup>) / (e<sup>x</sup> + e<sup>-x</sup>)', outputRange: '(-1, 1)', derivativeRange: '(0, 1]', zeroCentered: '是', vanishingGradient: '中等', desc: '零中心化，收敛更快。输出范围对称，梯度比 Sigmoid 大。推荐用于 RNN 隐藏层。', color: '#9b59b6' },
            relu: { name: 'ReLU', func: x => Math.max(0, x), derivative: x => x > 0 ? 1 : 0, formula: 'ReLU(x) = max(0, x)', outputRange: '[0, +∞)', derivativeRange: '{0, 1}', zeroCentered: '否', vanishingGradient: '轻微', desc: '计算极快，缓解梯度消失，稀疏激活特性。但有"死亡 ReLU"问题。推荐作为隐藏层的默认选择。', color: '#2ecc71' },
            leaky_relu: { name: 'Leaky ReLU', func: x => x > 0 ? x : 0.01 * x, derivative: x => x > 0 ? 1 : 0.01, formula: 'LeakyReLU(x) = { x, if x > 0; αx, if x ≤ 0 }', outputRange: '(-∞, +∞)', derivativeRange: '{0.01, 1}', zeroCentered: '否', vanishingGradient: '轻微', desc: '解决"死亡 ReLU"问题，负值区域仍有梯度。推荐用于深层网络。', color: '#f39c12' },
            softmax: { name: 'Softmax', func: null, derivative: null, formula: 'Softmax(x<sub>i</sub>) = e<sup>x<sub>i</sub></sup> / Σ<sub>j</sub> e<sup>x<sub>j</sub></sup>', outputRange: '(0, 1), 和为1', derivativeRange: '雅可比矩阵', zeroCentered: '否', vanishingGradient: '无', desc: '输出为概率分布，适合多分类。与 Cross-Entropy 组合梯度简洁。推荐用于多分类问题的输出层。', color: '#e74c3c', isMultiInput: true }
        };
        let currentActivation = 'sigmoid';
        const activationOrder = ['sigmoid', 'tanh', 'relu', 'leaky_relu', 'softmax'];
        let currentIdx = 0;
        function initUI() {
            const indicator = document.getElementById('funcIndicator');
            const tabs = document.getElementById('tabsContainer');
            activationOrder.forEach((name, idx) => {
                const dot = document.createElement('div');
                dot.className = 'func-dot' + (idx === 0 ? ' active' : '');
                indicator.appendChild(dot);
                const tab = document.createElement('div');
                tab.className = 'tab' + (idx === 0 ? ' active' : '');
                tab.textContent = activations[name].name;
                tabs.appendChild(tab);
            });
        }
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }
        function draw() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;
            const act = activations[currentActivation];
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#fafafa';
            ctx.fillRect(0, 0, width, height);
            const padding = 30;
            const graphWidth = width - padding * 2;
            const graphHeight = height - padding * 2;
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 10; i++) {
                const x = padding + (graphWidth / 10) * i;
                ctx.beginPath(); ctx.moveTo(x, padding); ctx.lineTo(x, height - padding); ctx.stroke();
            }
            for (let i = 0; i <= 8; i++) {
                const y = padding + (graphHeight / 8) * i;
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(width - padding, y); ctx.stroke();
            }
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            const yMid = padding + graphHeight / 2;
            ctx.beginPath(); ctx.moveTo(padding, yMid); ctx.lineTo(width - padding, yMid); ctx.stroke();
            const xMid = padding + graphWidth / 2;
            ctx.beginPath(); ctx.moveTo(xMid, padding); ctx.lineTo(xMid, height - padding); ctx.stroke();
            ctx.fillStyle = '#333';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            for (let i = 0; i <= 6; i++) { const val = -6 + i * 2; ctx.fillText(val.toString(), padding + (graphWidth / 6) * i, height - padding + 12); }
            ctx.textAlign = 'right';
            for (let i = 0; i <= 4; i++) { ctx.fillText((2 - i).toString(), padding - 5, padding + (graphHeight / 4) * i + 4); }
            if (act.isMultiInput) { drawSoftmax(width, height, padding, graphWidth, graphHeight); return; }
            ctx.strokeStyle = act.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let px = 0; px <= graphWidth; px++) {
                const x = (px / graphWidth) * 12 - 6;
                const y = act.func(x);
                const screenY = yMid - y * (graphHeight / 4);
                if (px === 0) ctx.moveTo(padding + px, screenY); else ctx.lineTo(padding + px, screenY);
            }
            ctx.stroke();
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            for (let px = 0; px <= graphWidth; px++) {
                const x = (px / graphWidth) * 12 - 6;
                const y = act.derivative(x);
                const screenY = yMid - y * (graphHeight / 4);
                if (px === 0) ctx.moveTo(padding + px, screenY); else ctx.lineTo(padding + px, screenY);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = act.color;
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('— 函数', width - padding - 70, padding + 15);
            ctx.fillStyle = '#e74c3c';
            ctx.fillText('- - 导数', width - padding - 70, padding + 32);
        }
        function drawSoftmax(width, height, padding, graphWidth, graphHeight) {
            const yMid = padding + graphHeight / 2;
            ctx.fillStyle = '#e74c3c'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left'; ctx.fillText('x₁ = -2', padding + 10, padding + 15);
            ctx.fillStyle = '#3498db'; ctx.fillText('x₂ = 0', padding + 10, padding + 30);
            ctx.fillStyle = '#2ecc71'; ctx.fillText('x₃ = 2', padding + 10, padding + 45);
            ctx.font = '12px sans-serif';
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            ctx.fillText('Softmax 将向量转换为概率分布', width / 2, height - 8);
            const exampleInputs = [1, 2, 3];
            const maxVal = Math.max(...exampleInputs);
            const expVals = exampleInputs.map(x => Math.exp(x - maxVal));
            const sum = expVals.reduce((a, b) => a + b, 0);
            const probs = expVals.map(v => v / sum);
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('示例: 输入 [1, 2, 3]', padding + 10, yMid - 30);
            ctx.fillText(`输出: [${probs.map(p => p.toFixed(3)).join(', ')}]`, padding + 10, yMid - 15);
            ctx.fillText(`和 = ${probs.reduce((a, b) => a + b, 0).toFixed(4)}`, padding + 10, yMid);
        }
        function selectActivation(name) {
            currentActivation = name;
            currentIdx = activationOrder.indexOf(name);
            const act = activations[name];
            document.querySelectorAll('.tab').forEach((tab, i) => tab.classList.toggle('active', activationOrder[i] === name));
            document.querySelectorAll('.func-dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
            document.getElementById('formulaBox').innerHTML = act.formula;
            document.getElementById('outputRangeValue').textContent = act.outputRange;
            document.getElementById('derivativeRangeValue').textContent = act.derivativeRange;
            document.getElementById('zeroCentered').textContent = act.zeroCentered;
            document.getElementById('vanishingGradient').textContent = act.vanishingGradient;
            document.getElementById('explanation').innerHTML = `<h3>${act.name}</h3><p>${act.desc}</p>`;
            draw();
        }
        initUI();
        window.addEventListener('load', () => { resizeCanvas(); selectActivation('sigmoid'); });
        window.addEventListener('resize', resizeCanvas);
        setInterval(() => { currentIdx = (currentIdx + 1) % activationOrder.length; selectActivation(activationOrder[currentIdx]); }, 3000);
    </script>
</body>
</html>
