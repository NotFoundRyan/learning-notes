<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张量维度可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 2%; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #333; margin-bottom: 1.5%; font-size: clamp(14px, 2vw, 24px); }
        .dim-indicator { display: flex; justify-content: center; gap: 12px; margin-bottom: 1.5%; }
        .dim-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .dim-dot.active { background: #333; transform: scale(1.3); }
        .visualization { flex: 1; display: flex; justify-content: center; align-items: center; min-height: 0; perspective: 1000px; }
        .tensor-display { text-align: center; }
        .shape-info { text-align: center; margin-top: 1.5%; padding: 1.5%; background: #f0f0f0; border-radius: 8px; }
        .shape-info code { font-family: 'Monaco', 'Consolas', monospace; background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: clamp(10px, 1.2vw, 14px); }
        .dim-label { display: inline-block; padding: 4px 12px; margin: 4px; background: #e0e0e0; border-radius: 4px; font-size: clamp(10px, 1.1vw, 13px); }
        .dim-label span { font-weight: bold; color: #333; }
        .scalar { width: clamp(60px, 10vw, 80px); height: clamp(60px, 10vw, 80px); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: clamp(18px, 3vw, 24px); font-weight: bold; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); animation: pulse 2s ease-in-out infinite; margin: 0 auto; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .vector { display: flex; gap: clamp(4px, 1vw, 8px); animation: slideIn 0.5s ease-out; justify-content: center; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .vector-item { width: clamp(40px, 7vw, 60px); height: clamp(40px, 7vw, 60px); background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: clamp(12px, 2vw, 16px); font-weight: bold; box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4); }
        .matrix { display: grid; gap: clamp(3px, 0.5vw, 6px); animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .matrix-row { display: flex; gap: clamp(3px, 0.5vw, 6px); justify-content: center; }
        .matrix-item { width: clamp(35px, 6vw, 50px); height: clamp(35px, 6vw, 50px); background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: clamp(10px, 1.5vw, 14px); font-weight: bold; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); }
        .tensor-3d { position: relative; transform-style: preserve-3d; animation: rotate3d 10s linear infinite; }
        @keyframes rotate3d { from { transform: rotateY(0deg) rotateX(10deg); } to { transform: rotateY(360deg) rotateX(10deg); } }
        .tensor-slice { position: absolute; display: grid; gap: 3px; opacity: 0.9; }
        .tensor-slice-row { display: flex; gap: 3px; }
        .tensor-item { width: clamp(22px, 4vw, 30px); height: clamp(22px, 4vw, 30px); background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-size: clamp(8px, 1vw, 10px); font-weight: bold; box-shadow: 0 2px 8px rgba(250, 112, 154, 0.4); }
        .explanation { margin-top: 1.5%; padding: 1.5%; background: #fff; border-left: 4px solid #333; border-radius: 0 8px 8px 0; }
        .explanation h3 { color: #333; margin-bottom: 0.5%; font-size: clamp(12px, 1.3vw, 14px); }
        .explanation p { color: #666; font-size: clamp(10px, 1.2vw, 13px); line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>张量维度可视化</h1>
        <div class="dim-indicator" id="dimIndicator"></div>
        <div class="visualization"><div class="tensor-display" id="tensorDisplay"></div></div>
        <div class="shape-info" id="shapeInfo"><p>形状: <code>scalar</code></p><div style="margin-top: 12px;"><span class="dim-label">维度: <span>0</span></span><span class="dim-label">元素数: <span>1</span></span></div></div>
        <div class="explanation" id="explanation"><h3>标量 (Scalar)</h3><p>标量是单个数值，没有维度。例如：温度 36.5°C、学习率 0.001、损失值 0.523。</p></div>
    </div>
    <script>
        const tensorDisplay = document.getElementById('tensorDisplay');
        const shapeInfo = document.getElementById('shapeInfo');
        const explanation = document.getElementById('explanation');
        const dimIndicator = document.getElementById('dimIndicator');
        let currentDim = 0;
        const data = {
            0: { render: () => '<div class="scalar">5</div>', shape: 'scalar', dims: 0, elements: 1, title: '标量 (Scalar)', desc: '标量是单个数值，没有维度。例如：温度 36.5°C、学习率 0.001、损失值 0.523。' },
            1: { render: () => { const values = [1, 2, 3, 4, 5]; return '<div class="vector">' + values.map((v, i) => `<div class="vector-item" style="animation-delay: ${i * 0.1}s">${v}</div>`).join('') + '</div>'; }, shape: '(5,)', dims: 1, elements: 5, title: '向量 (Vector)', desc: '向量是一维数组，有一个轴。例如：[1, 2, 3, 4, 5] 表示 5 个元素的向量，形状为 (5,)。常见于词嵌入、偏置项等。' },
            2: { render: () => { const matrix = [[1, 2, 3], [4, 5, 6], [4, 7, 2]]; return '<div class="matrix">' + matrix.map(row => '<div class="matrix-row">' + row.map(v => `<div class="matrix-item">${v}</div>`).join('') + '</div>').join('') + '</div>'; }, shape: '(3, 3)', dims: 2, elements: 9, title: '矩阵 (Matrix)', desc: '矩阵是二维数组，有两个轴（行和列）。例如：3×3 矩阵，形状为 (3, 3)。常见于权重矩阵、灰度图像等。' },
            3: { render: () => { const slices = [[[1, 2], [3, 4]], [[5, 6], [7, 8]], [[9, 1], [2, 3]]]; return '<div class="tensor-3d">' + slices.map((slice, i) => `<div class="tensor-slice" style="transform: translateZ(${i * 35}px)">` + slice.map(row => '<div class="tensor-slice-row">' + row.map(v => `<div class="tensor-item">${v}</div>`).join('') + '</div>').join('') + '</div>').join('') + '</div>'; }, shape: '(3, 2, 2)', dims: 3, elements: 12, title: '3D 张量', desc: '3D 张量有三个轴。例如：形状 (3, 2, 2) 表示 3 个 2×2 的矩阵。常见于 RGB 图像 (H, W, C)、时间序列数据等。' }
        };
        function initDimIndicator() { dimIndicator.innerHTML = ''; for (let i = 0; i < 4; i++) { const dot = document.createElement('div'); dot.className = 'dim-dot'; dimIndicator.appendChild(dot); } }
        function renderTensor(dim) {
            const d = data[dim];
            tensorDisplay.innerHTML = d.render();
            shapeInfo.innerHTML = '<p>形状: <code>' + d.shape + '</code></p><div style="margin-top: 12px;"><span class="dim-label">维度: <span>' + d.dims + '</span></span><span class="dim-label">元素数: <span>' + d.elements + '</span></span></div>';
            explanation.innerHTML = '<h3>' + d.title + '</h3><p>' + d.desc + '</p>';
            document.querySelectorAll('.dim-dot').forEach((dot, i) => dot.classList.toggle('active', i === dim));
            currentDim = dim;
        }
        initDimIndicator();
        renderTensor(0);
        setInterval(() => { currentDim = (currentDim + 1) % 4; renderTensor(currentDim); }, 2500);
    </script>
</body>
</html>
