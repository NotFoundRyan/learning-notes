<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件回调演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d30 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 300;
        }
        
        .card {
            background: rgba(50, 50, 55, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card h2 {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 400;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 14px 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(60, 60, 65, 0.8);
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button:hover {
            background: rgba(80, 80, 85, 0.9);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            color: #fff;
            font-weight: 300;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }
        
        .log-container {
            background: rgba(25, 25, 30, 0.9);
            border-radius: 10px;
            padding: 16px;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            margin-top: 20px;
        }
        
        .log-entry {
            padding: 8px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid transparent;
        }
        
        .log-entry.event { border-left-color: #888; }
        .log-entry.callback { border-left-color: #aaa; }
        .log-entry.action { border-left-color: #ccc; }
        .log-entry.error { border-left-color: #f44; }
        
        .log-entry strong {
            color: #888;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ 事件回调演示</h1>
        
        <div class="card">
            <h2>事件触发模拟</h2>
            <div class="button-group">
                <button onclick="triggerEvent('temperature')">🌡 温度更新</button>
                <button onclick="triggerEvent('humidity')">💧 湿度更新</button>
                <button onclick="triggerEvent('pressure')">📊 气压更新</button>
                <button onclick="triggerEvent('error')">⚠ 错误事件</button>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="tempValue">--</div>
                    <div class="stat-label">温度 (°C)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="humidValue">--</div>
                    <div class="stat-label">湿度 (%)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="pressValue">--</div>
                    <div class="stat-label">气压 (hPa)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="eventCount">0</div>
                    <div class="stat-label">事件计数</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>回调执行日志</h2>
            <div class="log-container" id="eventLog">
                <div class="log-entry event">等待事件触发...</div>
            </div>
        </div>
    </div>

    <script>
        const eventCallbacks = {};
        let eventCount = 0;
        
        function log(message, type = 'event') {
            const container = document.getElementById('eventLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            container.insertBefore(entry, container.firstChild);
            while (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }
        
        function registerEventCallback(eventName, callback) {
            eventCallbacks[eventName] = callback;
            log(`注册事件回调: ${eventName}`, 'action');
        }
        
        function triggerEvent(eventName) {
            eventCount++;
            document.getElementById('eventCount').textContent = eventCount;
            
            log(`事件触发: ${eventName}`, 'event');
            
            if (eventCallbacks[eventName]) {
                const data = eventCallbacks[eventName]();
                log(`回调执行: 处理 ${eventName} 数据`, 'callback');
            } else {
                log(`事件 ${eventName} 无回调函数注册`, 'error');
            }
        }
        
        registerEventCallback('temperature', () => {
            const temp = (Math.random() * 10 + 20).toFixed(1);
            document.getElementById('tempValue').textContent = temp;
            log(`更新温度: ${temp}°C`, 'action');
            return temp;
        });
        
        registerEventCallback('humidity', () => {
            const humid = (Math.random() * 20 + 40).toFixed(1);
            document.getElementById('humidValue').textContent = humid;
            log(`更新湿度: ${humid}%`, 'action');
            return humid;
        });
        
        registerEventCallback('pressure', () => {
            const press = (Math.random() * 50 + 1000).toFixed(0);
            document.getElementById('pressValue').textContent = press;
            log(`更新气压: ${press} hPa`, 'action');
            return press;
        });
        
        registerEventCallback('error', () => {
            log(`错误处理: 发送警报通知`, 'error');
            return 'ERROR';
        });
    </script>
</body>
</html>
