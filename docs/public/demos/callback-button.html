<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按键回调演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100%;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }
        
        .button-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-normal {
            background: #e8e8e8;
            color: #333;
        }
        
        .btn-pressed {
            background: #333;
            color: white;
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .btn:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .log-container {
            background: #fafafa;
            border-radius: 8px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
        }
        
        .log-entry {
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 4px;
            background: white;
            border-left: 3px solid #ccc;
        }
        
        .log-entry.pressed {
            border-left-color: #333;
        }
        
        .log-entry.released {
            border-left-color: #999;
        }
        
        .log-entry.callback {
            border-left-color: #555;
        }
        
        .timestamp {
            color: #999;
            margin-right: 8px;
        }
        
        .event-type {
            font-weight: 600;
        }
        
        .event-type.press { color: #333; }
        .event-type.release { color: #666; }
        .event-type.callback { color: #555; }
        
        .callback-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .callback-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #fafafa;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .callback-item.active {
            background: #333;
            color: white;
        }
        
        .callback-item .name {
            flex: 1;
        }
        
        .callback-item .status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #e8e8e8;
        }
        
        .callback-item.active .status {
            background: rgba(255,255,255,0.2);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 12px;
            background: #fafafa;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>按键回调演示</h2>
        
        <div class="button-area">
            <button class="btn btn-normal" id="btn1" 
                    onmousedown="buttonPress(1)" 
                    onmouseup="buttonRelease(1)"
                    onmouseleave="buttonRelease(1)">
                按键 1
            </button>
            <button class="btn btn-normal" id="btn2"
                    onmousedown="buttonPress(2)" 
                    onmouseup="buttonRelease(2)"
                    onmouseleave="buttonRelease(2)">
                按键 2
            </button>
            <button class="btn btn-normal" id="btn3"
                    onmousedown="buttonPress(3)" 
                    onmouseup="buttonRelease(3)"
                    onmouseleave="buttonRelease(3)">
                按键 3
            </button>
        </div>
        
        <div class="card">
            <h3>注册的回调函数</h3>
            <div class="callback-list">
                <div class="callback-item" id="cb1">
                    <span class="name">onButtonPress</span>
                    <span class="status">按下时触发</span>
                </div>
                <div class="callback-item" id="cb2">
                    <span class="name">onButtonRelease</span>
                    <span class="status">释放时触发</span>
                </div>
                <div class="callback-item" id="cb3">
                    <span class="name">onButtonClick</span>
                    <span class="status">点击完成触发</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>事件日志</h3>
            <div class="log-container" id="logContainer">
                <div class="log-entry">
                    <span class="timestamp">--:--:--</span>
                    等待按键操作...
                </div>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="pressCount">0</div>
                <div class="stat-label">按下次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="releaseCount">0</div>
                <div class="stat-label">释放次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="clickCount">0</div>
                <div class="stat-label">点击次数</div>
            </div>
        </div>
    </div>

    <script>
        let pressCount = 0;
        let releaseCount = 0;
        let clickCount = 0;
        let buttonStates = { 1: false, 2: false, 3: false };
        
        function log(message, type = '') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            
            const now = new Date();
            const timestamp = now.toLocaleTimeString('zh-CN', { hour12: false });
            
            entry.innerHTML = `<span class="timestamp">${timestamp}</span>${message}`;
            container.insertBefore(entry, container.firstChild);
            
            while (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }
        
        function flashCallback(id) {
            const el = document.getElementById(id);
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 200);
        }
        
        function buttonPress(btnId) {
            if (buttonStates[btnId]) return;
            buttonStates[btnId] = true;
            
            const btn = document.getElementById('btn' + btnId);
            btn.className = 'btn btn-pressed';
            
            pressCount++;
            document.getElementById('pressCount').textContent = pressCount;
            
            log(`<span class="event-type press">按键${btnId}按下</span>`, 'pressed');
            
            flashCallback('cb1');
            log(`<span class="event-type callback">→ 触发 onButtonPress(${btnId})</span>`, 'callback');
        }
        
        function buttonRelease(btnId) {
            if (!buttonStates[btnId]) return;
            buttonStates[btnId] = false;
            
            const btn = document.getElementById('btn' + btnId);
            btn.className = 'btn btn-normal';
            
            releaseCount++;
            document.getElementById('releaseCount').textContent = releaseCount;
            
            clickCount++;
            document.getElementById('clickCount').textContent = clickCount;
            
            log(`<span class="event-type release">按键${btnId}释放</span>`, 'released');
            
            flashCallback('cb2');
            log(`<span class="event-type callback">→ 触发 onButtonRelease(${btnId})</span>`, 'callback');
            
            flashCallback('cb3');
            log(`<span class="event-type callback">→ 触发 onButtonClick(${btnId})</span>`, 'callback');
        }
    </script>
</body>
</html>
