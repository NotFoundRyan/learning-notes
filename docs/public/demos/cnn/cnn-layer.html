<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNN 卷积层可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 2%; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 15px; font-size: 1.4rem; }
        .controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; flex-wrap: wrap; }
        .slider-group { display: flex; align-items: center; gap: 8px; background: #f8f8f8; padding: 8px 16px; border-radius: 8px; }
        .slider-group label { font-size: 13px; color: #666; min-width: 50px; }
        input[type="range"] { width: 80px; cursor: pointer; }
        .slider-value { font-size: 13px; font-weight: bold; color: #333; min-width: 20px; }
        .visualization { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 15px; flex-wrap: wrap; }
        .matrix-container { text-align: center; }
        .matrix-title { font-size: 13px; color: #333; margin-bottom: 8px; font-weight: bold; }
        .matrix { display: grid; gap: 2px; background: #e0e0e0; padding: 4px; border-radius: 8px; }
        .cell { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-radius: 4px; transition: all 0.3s; }
        .input-cell { background: #fff; color: #333; }
        .input-cell.highlight { background: #3498db; color: #fff; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.5); }
        .input-cell.padding-cell { background: #f0f0f0; color: #999; border: 1px dashed #ccc; }
        .kernel-cell { background: #2ecc71; color: #fff; }
        .output-cell { background: #e74c3c; color: #fff; }
        .output-cell.current { background: #9b59b6; transform: scale(1.1); box-shadow: 0 0 8px rgba(155, 89, 182, 0.5); }
        .arrow { font-size: 20px; color: #333; }
        .calculation { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 15px; font-family: 'Monaco', 'Consolas', monospace; font-size: 12px; }
        .calculation .step { margin: 6px 0; color: #666; }
        .calculation .result { color: #e74c3c; font-weight: bold; font-size: 14px; }
        .calculation .highlight { background: #fff3cd; padding: 2px 4px; border-radius: 3px; }
        .info-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 15px; }
        .info-card { background: #fff; border-radius: 8px; padding: 12px; text-align: center; }
        .info-card .label { font-size: 11px; color: #666; margin-bottom: 4px; }
        .info-card .value { font-size: 16px; font-weight: bold; color: #333; }
        .explanation { padding: 12px; background: #fff; border-left: 4px solid #333; border-radius: 0 8px 8px 0; }
        .explanation h3 { color: #333; margin-bottom: 6px; font-size: 13px; }
        .explanation p { color: #666; font-size: 12px; line-height: 1.5; }
        .animation-controls { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
        .speed-btn { padding: 8px 16px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .speed-btn:hover { background: #f0f0f0; }
        .formula { text-align: center; background: #f8f9fa; padding: 8px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; color: #333; }
        .formula code { background: #e9ecef; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CNN 卷积层可视化</h1>

        <div class="controls">
            <div class="slider-group">
                <label>步长:</label>
                <input type="range" id="stride" min="1" max="3" value="1">
                <span class="slider-value" id="strideValue">1</span>
            </div>
            <div class="slider-group">
                <label>填充:</label>
                <input type="range" id="padding" min="0" max="2" value="0">
                <span class="slider-value" id="paddingValue">0</span>
            </div>
        </div>

        <div class="formula">
            输出尺寸 = ⌊<code>(输入尺寸 - 卷积核尺寸 + 2×填充) / 步长</code>⌋ + 1
        </div>

        <div class="visualization">
            <div class="matrix-container">
                <div class="matrix-title" id="inputTitle">输入特征图 (5×5)</div>
                <div class="matrix" id="inputMatrix"></div>
            </div>

            <div class="matrix-container">
                <div class="matrix-title">卷积核 (3×3)</div>
                <div class="matrix" id="kernelMatrix"></div>
            </div>

            <div class="arrow">→</div>

            <div class="matrix-container">
                <div class="matrix-title" id="outputTitle">输出特征图</div>
                <div class="matrix" id="outputMatrix"></div>
            </div>
        </div>

        <div class="calculation" id="calculation">
            <div class="step">自动演示卷积操作中...</div>
        </div>

        <div class="info-panel">
            <div class="info-card">
                <div class="label">输入尺寸</div>
                <div class="value" id="inputSize">5 × 5</div>
            </div>
            <div class="info-card">
                <div class="label">卷积核尺寸</div>
                <div class="value">3 × 3</div>
            </div>
            <div class="info-card">
                <div class="label">输出尺寸</div>
                <div class="value" id="outputSize">3 × 3</div>
            </div>
            <div class="info-card">
                <div class="label">当前位置</div>
                <div class="value" id="currentPos">(0, 0)</div>
            </div>
        </div>

        <div class="explanation">
            <h3>卷积操作说明</h3>
            <p>卷积核在输入特征图上滑动，每次覆盖一个区域，将对应位置的元素相乘后求和。填充(padding)在输入周围添加0值，步长(stride)控制卷积核移动的步距。</p>
        </div>

        <div class="animation-controls">
            <button class="speed-btn" id="autoPlay">▶ 自动演示</button>
            <button class="speed-btn" id="resetBtn">↺ 重置</button>
        </div>
    </div>

    <script>
        const inputSize = 5;
        const kernelSize = 3;
        let stride = 1;
        let padding = 0;

        let inputData = [];
        let paddedData = [];
        let kernelData = [];
        let outputData = [];
        let currentRow = 0;
        let currentCol = 0;
        let autoPlayInterval = null;

        function generateRandomData(size) {
            const data = [];
            for (let i = 0; i < size; i++) {
                const row = [];
                for (let j = 0; j < size; j++) {
                    row.push(Math.floor(Math.random() * 10));
                }
                data.push(row);
            }
            return data;
        }

        function generateKernel() {
            return [
                [1, 0, -1],
                [1, 0, -1],
                [1, 0, -1]
            ];
        }

        function getPaddedSize() {
            return inputSize + 2 * padding;
        }

        function getOutputSize() {
            const size = Math.floor((inputSize - kernelSize + 2 * padding) / stride) + 1;
            return size > 0 ? size : 0;
        }

        function isValidConfig() {
            return getOutputSize() > 0;
        }

        function createPaddedData() {
            const paddedSize = getPaddedSize();
            paddedData = [];
            for (let i = 0; i < paddedSize; i++) {
                const row = [];
                for (let j = 0; j < paddedSize; j++) {
                    const inputI = i - padding;
                    const inputJ = j - padding;
                    if (inputI >= 0 && inputI < inputSize && inputJ >= 0 && inputJ < inputSize) {
                        row.push(inputData[inputI][inputJ]);
                    } else {
                        row.push(0);
                    }
                }
                paddedData.push(row);
            }
        }

        function renderInputMatrix() {
            const container = document.getElementById('inputMatrix');
            const paddedSize = getPaddedSize();
            container.style.gridTemplateColumns = `repeat(${paddedSize}, 36px)`;
            container.innerHTML = '';

            for (let i = 0; i < paddedSize; i++) {
                for (let j = 0; j < paddedSize; j++) {
                    const cell = document.createElement('div');
                    const isPadding = (i < padding || i >= paddedSize - padding || j < padding || j >= paddedSize - padding);
                    cell.className = 'cell ' + (isPadding ? 'input-cell padding-cell' : 'input-cell');
                    cell.textContent = paddedData[i][j];
                    cell.id = `input-${i}-${j}`;
                    container.appendChild(cell);
                }
            }

            document.getElementById('inputTitle').textContent = `输入特征图 (${paddedSize}×${paddedSize}${padding > 0 ? ', 含填充' : ''})`;
        }

        function renderKernelMatrix() {
            const container = document.getElementById('kernelMatrix');
            container.style.gridTemplateColumns = `repeat(${kernelSize}, 36px)`;
            container.innerHTML = '';

            for (let i = 0; i < kernelSize; i++) {
                for (let j = 0; j < kernelSize; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell kernel-cell';
                    cell.textContent = kernelData[i][j];
                    container.appendChild(cell);
                }
            }
        }

        function renderOutputMatrix() {
            const outputSize = getOutputSize();
            const container = document.getElementById('outputMatrix');

            if (outputSize <= 0) {
                container.style.gridTemplateColumns = '1fr';
                container.innerHTML = '<div class="cell output-cell" style="width:auto;height:36px;">无效配置</div>';
                document.getElementById('outputTitle').textContent = '输出特征图';
                return;
            }

            container.style.gridTemplateColumns = `repeat(${outputSize}, 36px)`;
            container.innerHTML = '';

            outputData = [];
            for (let i = 0; i < outputSize; i++) {
                outputData[i] = [];
                for (let j = 0; j < outputSize; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell output-cell';
                    cell.textContent = '?';
                    cell.id = `output-${i}-${j}`;
                    outputData[i][j] = null;
                    container.appendChild(cell);
                }
            }

            document.getElementById('outputTitle').textContent = `输出特征图 (${outputSize}×${outputSize})`;
        }

        function highlightInputRegion(row, col) {
            document.querySelectorAll('.input-cell').forEach(cell => {
                cell.classList.remove('highlight');
            });

            for (let i = 0; i < kernelSize; i++) {
                for (let j = 0; j < kernelSize; j++) {
                    const inputRow = row + i;
                    const inputCol = col + j;
                    const cell = document.getElementById(`input-${inputRow}-${inputCol}`);
                    if (cell) {
                        cell.classList.add('highlight');
                    }
                }
            }
        }

        function calculateConvolution(row, col) {
            let sum = 0;
            const steps = [];

            for (let i = 0; i < kernelSize; i++) {
                for (let j = 0; j < kernelSize; j++) {
                    const inputVal = paddedData[row + i][col + j];
                    const kernelVal = kernelData[i][j];
                    const product = inputVal * kernelVal;
                    sum += product;
                    steps.push(`${inputVal}×${kernelVal}`);
                }
            }

            return { sum, steps };
        }

        function updateCalculation(row, col) {
            const { sum, steps } = calculateConvolution(row, col);
            const calculation = document.getElementById('calculation');

            calculation.innerHTML = `
                <div class="step">输出位置 (${currentRow}, ${currentCol}) ← 输入位置 (${row}, ${col})</div>
                <div class="step">${steps.join(' + ')} = <span class="highlight">${sum}</span></div>
                <div class="result">输出值 = ${sum}</div>
            `;
        }

        function step() {
            if (!isValidConfig()) return;

            const outputSize = getOutputSize();

            if (currentRow >= outputSize) {
                setTimeout(() => {
                    reset();
                }, 2500);
                return;
            }

            const inputRow = currentRow * stride;
            const inputCol = currentCol * stride;

            highlightInputRegion(inputRow, inputCol);
            updateCalculation(inputRow, inputCol);

            const { sum } = calculateConvolution(inputRow, inputCol);
            outputData[currentRow][currentCol] = sum;

            const outputCell = document.getElementById(`output-${currentRow}-${currentCol}`);
            if (outputCell) {
                outputCell.textContent = sum;
                outputCell.classList.add('current');

                setTimeout(() => {
                    outputCell.classList.remove('current');
                }, 1000);
            }

            document.getElementById('currentPos').textContent = `(${currentRow}, ${currentCol})`;

            currentCol++;
            if (currentCol >= outputSize) {
                currentCol = 0;
                currentRow++;
            }
        }

        function stopAutoPlay() {
            if (autoPlayInterval) {
                clearInterval(autoPlayInterval);
                autoPlayInterval = null;
                document.getElementById('autoPlay').textContent = '▶ 自动演示';
            }
        }

        function reset() {
            stopAutoPlay();
            inputData = generateRandomData(inputSize);
            kernelData = generateKernel();
            createPaddedData();
            currentRow = 0;
            currentCol = 0;

            renderInputMatrix();
            renderKernelMatrix();
            renderOutputMatrix();

            if (!isValidConfig()) {
                document.getElementById('calculation').innerHTML = '<div class="step">当前配置无效，请调整步长或填充</div>';
                document.getElementById('outputSize').textContent = '无效';
                return;
            }

            document.getElementById('calculation').innerHTML = '<div class="step">自动演示卷积操作中...</div>';
            document.getElementById('currentPos').textContent = '(0, 0)';
            updateOutputSize();

            autoPlayInterval = setInterval(step, 2000);
            document.getElementById('autoPlay').textContent = '⏸ 暂停';
        }

        function updateOutputSize() {
            const outputSize = getOutputSize();
            document.getElementById('outputSize').textContent = `${outputSize} × ${outputSize}`;
        }

        document.getElementById('stride').addEventListener('input', (e) => {
            stride = parseInt(e.target.value);
            document.getElementById('strideValue').textContent = stride;
            reset();
        });

        document.getElementById('padding').addEventListener('input', (e) => {
            padding = parseInt(e.target.value);
            document.getElementById('paddingValue').textContent = padding;
            reset();
        });

        document.getElementById('autoPlay').addEventListener('click', function() {
            if (autoPlayInterval) {
                stopAutoPlay();
            } else {
                if (!isValidConfig()) return;
                autoPlayInterval = setInterval(step, 2000);
                this.textContent = '⏸ 暂停';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', reset);

        reset();
    </script>
</body>
</html>
