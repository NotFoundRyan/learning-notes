<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据封装演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #4facfe;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .frame-visualizer {
            display: flex;
            align-items: stretch;
            gap: 2px;
            margin: 20px 0;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
        }
        
        .frame-field {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 10px;
            border-radius: 8px;
            min-width: 60px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .frame-field:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .frame-field.header { background: #4facfe; color: white; }
        .frame-field.length { background: #00f2fe; color: white; }
        .frame-field.cmd { background: #667eea; color: white; }
        .frame-field.data { background: #764ba2; color: white; }
        .frame-field.crc { background: #f093fb; color: white; }
        .frame-field.tail { background: #f5576c; color: white; }
        
        .frame-field .value {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .frame-field .label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        .frame-field .size {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 3px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #4facfe;
        }
        
        .input-group textarea {
            font-family: 'Courier New', monospace;
            min-height: 80px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }
        
        .hex-display {
            background: #1a1a2e;
            color: #00ff88;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            overflow-x: auto;
            margin-top: 20px;
        }
        
        .hex-display .byte {
            display: inline-block;
            padding: 4px 8px;
            margin: 2px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        
        .hex-display .byte:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .hex-display .byte.header { background: rgba(79, 172, 254, 0.3); }
        .hex-display .byte.length { background: rgba(0, 242, 254, 0.3); }
        .hex-display .byte.cmd { background: rgba(102, 126, 234, 0.3); }
        .hex-display .byte.data { background: rgba(118, 75, 162, 0.3); }
        .hex-display .byte.crc { background: rgba(240, 147, 251, 0.3); }
        .hex-display .byte.tail { background: rgba(245, 87, 108, 0.3); }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4facfe;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .log-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .log-entry {
            padding: 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            animation: fadeIn 0.3s ease;
        }
        
        .log-entry.pack { background: #e3f2fd; border-left: 3px solid #2196f3; }
        .log-entry.unpack { background: #f3e5f5; border-left: 3px solid #9c27b0; }
        .log-entry.error { background: #ffebee; border-left: 3px solid #f44336; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 数据封装演示</h1>
        
        <div class="card">
            <h2>帧结构可视化</h2>
            <div class="frame-visualizer" id="frameVisualizer">
                <div class="frame-field header">
                    <div class="label">Header</div>
                    <div class="value" id="headerValue">AA 55</div>
                    <div class="size">2 bytes</div>
                </div>
                <div class="frame-field length">
                    <div class="label">Length</div>
                    <div class="value" id="lengthValue">--</div>
                    <div class="size">1 byte</div>
                </div>
                <div class="frame-field cmd">
                    <div class="label">Command</div>
                    <div class="value" id="cmdValue">--</div>
                    <div class="size">1 byte</div>
                </div>
                <div class="frame-field data" style="flex: 1;">
                    <div class="label">Data</div>
                    <div class="value" id="dataValue">--</div>
                    <div class="size">N bytes</div>
                </div>
                <div class="frame-field crc">
                    <div class="label">CRC</div>
                    <div class="value" id="crcValue">--</div>
                    <div class="size">2 bytes</div>
                </div>
                <div class="frame-field tail">
                    <div class="label">Tail</div>
                    <div class="value" id="tailValue">0D</div>
                    <div class="size">1 byte</div>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalLength">0</div>
                    <div class="stat-label">总长度 (bytes)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dataLength">0</div>
                    <div class="stat-label">数据长度</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="crcValueStat">--</div>
                    <div class="stat-label">CRC 值</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>数据打包</h2>
            <div class="input-group">
                <label>命令类型</label>
                <select id="commandSelect">
                    <option value="01">0x01 - 读版本</option>
                    <option value="02">0x02 - 读状态</option>
                    <option value="03">0x03 - 设置配置</option>
                    <option value="05">0x05 - 读数据</option>
                    <option value="06">0x06 - 写数据</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>数据内容 (十六进制，空格分隔)</label>
                <textarea id="dataInput" placeholder="例如: 01 02 03 04 05">12 34 56 78</textarea>
            </div>
            
            <div class="button-group">
                <button onclick="packFrame()">打包数据</button>
                <button onclick="packRandomData()">随机数据</button>
                <button onclick="clearData()">清空</button>
            </div>
            
            <div class="hex-display" id="hexDisplay">
                点击"打包数据"查看结果...
            </div>
        </div>
        
        <div class="card">
            <h2>数据解包</h2>
            <div class="input-group">
                <label>接收数据 (十六进制，空格分隔)</label>
                <textarea id="unpackInput" placeholder="粘贴完整帧数据"></textarea>
            </div>
            
            <div class="button-group">
                <button onclick="unpackFrame()">解包数据</button>
                <button onclick="loadLastFrame()">加载最后打包的帧</button>
            </div>
            
            <div class="log-container" id="unpackLog">
                <div class="log-entry unpack">等待解包...</div>
            </div>
        </div>
    </div>

    <script>
        let lastPackedFrame = [];
        
        // CRC16 计算
        function calculateCRC16(data) {
            let crc = 0xFFFF;
            
            for (let i = 0; i < data.length; i++) {
                crc ^= data[i];
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x0001) {
                        crc = (crc >> 1) ^ 0xA001;
                    } else {
                        crc >>= 1;
                    }
                }
            }
            
            return crc;
        }
        
        // 解析十六进制字符串
        function parseHexString(str) {
            const bytes = str.trim().split(/\s+/).map(s => parseInt(s, 16));
            return bytes.filter(b => !isNaN(b));
        }
        
        // 格式化十六进制显示
        function formatHexDisplay(bytes, types) {
            let html = '';
            bytes.forEach((byte, index) => {
                const type = types[index] || 'data';
                html += `<span class="byte ${type}">${byte.toString(16).toUpperCase().padStart(2, '0')}</span>`;
            });
            return html;
        }
        
        // 打包帧
        function packFrame() {
            const command = parseInt(document.getElementById('commandSelect').value, 16);
            const dataStr = document.getElementById('dataInput').value;
            const data = parseHexString(dataStr);
            
            // 构建帧
            const frame = [];
            const types = [];
            
            // 帧头
            frame.push(0xAA, 0x55);
            types.push('header', 'header');
            
            // 长度 (命令 + 数据)
            frame.push(data.length + 1);
            types.push('length');
            
            // 命令
            frame.push(command);
            types.push('cmd');
            
            // 数据
            data.forEach(byte => {
                frame.push(byte);
                types.push('data');
            });
            
            // CRC (从长度开始)
            const crcData = frame.slice(3);
            const crc = calculateCRC16(crcData);
            frame.push(crc & 0xFF, (crc >> 8) & 0xFF);
            types.push('crc', 'crc');
            
            // 帧尾
            frame.push(0x0D);
            types.push('tail');
            
            // 保存
            lastPackedFrame = [...frame];
            
            // 更新显示
            document.getElementById('hexDisplay').innerHTML = formatHexDisplay(frame, types);
            
            // 更新可视化
            document.getElementById('lengthValue').textContent = (data.length + 1).toString(16).toUpperCase().padStart(2, '0');
            document.getElementById('cmdValue').textContent = command.toString(16).toUpperCase().padStart(2, '0');
            document.getElementById('dataValue').textContent = data.length > 0 ? 
                data.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ') : '--';
            document.getElementById('crcValue').textContent = crc.toString(16).toUpperCase().padStart(4, '0');
            
            // 更新统计
            document.getElementById('totalLength').textContent = frame.length;
            document.getElementById('dataLength').textContent = data.length;
            document.getElementById('crcValueStat').textContent = '0x' + crc.toString(16).toUpperCase().padStart(4, '0');
        }
        
        // 随机数据
        function packRandomData() {
            const length = Math.floor(Math.random() * 8) + 1;
            const data = [];
            for (let i = 0; i < length; i++) {
                data.push(Math.floor(Math.random() * 256));
            }
            document.getElementById('dataInput').value = data.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            packFrame();
        }
        
        // 清空
        function clearData() {
            document.getElementById('dataInput').value = '';
            document.getElementById('hexDisplay').innerHTML = '点击"打包数据"查看结果...';
            document.getElementById('lengthValue').textContent = '--';
            document.getElementById('cmdValue').textContent = '--';
            document.getElementById('dataValue').textContent = '--';
            document.getElementById('crcValue').textContent = '--';
            document.getElementById('totalLength').textContent = '0';
            document.getElementById('dataLength').textContent = '0';
            document.getElementById('crcValueStat').textContent = '--';
        }
        
        // 解包帧
        function unpackFrame() {
            const inputStr = document.getElementById('unpackInput').value;
            const frame = parseHexString(inputStr);
            const log = document.getElementById('unpackLog');
            log.innerHTML = '';
            
            function addLog(message, type = 'unpack') {
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                entry.textContent = message;
                log.insertBefore(entry, log.firstChild);
            }
            
            // 检查最小长度
            if (frame.length < 7) {
                addLog('错误: 帧长度不足', 'error');
                return;
            }
            
            // 检查帧头
            if (frame[0] !== 0xAA || frame[1] !== 0x55) {
                addLog('错误: 帧头不正确', 'error');
                return;
            }
            
            addLog('✓ 帧头正确: AA 55');
            
            // 获取长度
            const length = frame[2];
            addLog(`✓ 数据长度: ${length} bytes`);
            
            // 检查帧尾
            if (frame[frame.length - 1] !== 0x0D) {
                addLog('错误: 帧尾不正确', 'error');
                return;
            }
            addLog('✓ 帧尾正确: 0D');
            
            // 获取命令
            const command = frame[3];
            addLog(`✓ 命令字: 0x${command.toString(16).toUpperCase().padStart(2, '0')}`);
            
            // 获取数据
            const dataLength = length - 1;
            const data = frame.slice(4, 4 + dataLength);
            if (data.length > 0) {
                addLog(`✓ 数据: ${data.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ')}`);
            }
            
            // 校验 CRC
            const receivedCRC = frame[frame.length - 3] | (frame[frame.length - 2] << 8);
            const calculatedCRC = calculateCRC16(frame.slice(3, 4 + dataLength));
            
            if (receivedCRC === calculatedCRC) {
                addLog(`✓ CRC 校验通过: 0x${receivedCRC.toString(16).toUpperCase().padStart(4, '0')}`);
                addLog('✓ 解包成功！');
            } else {
                addLog(`错误: CRC 校验失败 (接收: 0x${receivedCRC.toString(16).toUpperCase().padStart(4, '0')}, 计算: 0x${calculatedCRC.toString(16).toUpperCase().padStart(4, '0')})`, 'error');
            }
        }
        
        // 加载最后的帧
        function loadLastFrame() {
            if (lastPackedFrame.length > 0) {
                document.getElementById('unpackInput').value = 
                    lastPackedFrame.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            }
        }
        
        // 初始化
        packFrame();
    </script>
</body>
</html>
