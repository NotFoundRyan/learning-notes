<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNN 序列处理可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .container { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 2%; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #333; margin-bottom: 1%; font-size: clamp(14px, 2vw, 24px); }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 1%; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .step-dot.active { background: #333; transform: scale(1.2); }
        .rnn-flow { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; gap: 1%; padding: 2%; }
        .time-step { display: flex; flex-direction: column; align-items: center; padding: 1.5%; border-radius: 12px; background: white; min-width: clamp(70px, 12%, 100px); transition: all 0.3s; }
        .time-step.active { transform: scale(1.05); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .time-label { font-size: clamp(10px, 1.1vw, 12px); color: #999; margin-bottom: 0.5%; }
        .input-box { background: #e3f2fd; padding: 1.5%; border-radius: 8px; text-align: center; margin-bottom: 1%; width: 100%; }
        .input-value { font-size: clamp(14px, 1.8vw, 20px); font-weight: 600; color: #1976d2; }
        .hidden-box { background: #fff3e0; padding: 1.5%; border-radius: 8px; text-align: center; margin-bottom: 1%; width: 100%; }
        .hidden-value { font-size: clamp(12px, 1.4vw, 16px); color: #f57c00; font-family: 'Monaco', 'Consolas', monospace; }
        .output-box { background: #e8f5e9; padding: 1.5%; border-radius: 8px; text-align: center; width: 100%; }
        .output-value { font-size: clamp(12px, 1.4vw, 16px); color: #388e3c; font-family: 'Monaco', 'Consolas', monospace; }
        .flow-arrow { font-size: clamp(20px, 3vw, 32px); color: #999; }
        .formula-box { background: #f8f9fa; padding: 1.5%; border-radius: 8px; text-align: center; font-family: 'Times New Roman', serif; font-size: clamp(11px, 1.3vw, 15px); margin-bottom: 1%; }
        .explanation { padding: 1.5%; background: #fff; border-left: 4px solid #333; border-radius: 0 8px 8px 0; margin-top: auto; }
        .explanation h3 { color: #333; margin-bottom: 0.5%; font-size: clamp(12px, 1.3vw, 14px); }
        .explanation p { color: #666; font-size: clamp(10px, 1.2vw, 13px); line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RNN 序列处理可视化</h1>
        <div class="step-indicator" id="stepIndicator"></div>
        <div class="formula-box">h<sub>t</sub> = tanh(W<sub>hh</sub>h<sub>t-1</sub> + W<sub>xh</sub>x<sub>t</sub> + b<sub>h</sub>)</div>
        <div class="rnn-flow" id="rnnFlow"></div>
        <div class="explanation" id="explanation"><h3>RNN 序列处理</h3><p>RNN 通过隐藏状态在时间步之间传递信息，实现序列建模。每个时间步接收当前输入和上一时刻的隐藏状态。</p></div>
    </div>
    <script>
        const sequence = ['我', '爱', '学', '习'];
        const inputs = [0.8, 0.6, 0.7, 0.5];
        const hiddens = [0.3, 0.5, 0.6, 0.4];
        const outputs = [0.1, 0.2, 0.3, 0.7];
        let currentStep = 0;
        function initIndicator() {
            const indicator = document.getElementById('stepIndicator');
            sequence.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'step-dot' + (i === 0 ? ' active' : '');
                indicator.appendChild(dot);
            });
        }
        function createFlow() {
            const flow = document.getElementById('rnnFlow');
            flow.innerHTML = '';
            sequence.forEach((token, i) => {
                const step = document.createElement('div');
                step.className = 'time-step' + (i === currentStep ? ' active' : '');
                step.innerHTML = `
                    <div class="time-label">t=${i}</div>
                    <div class="input-box"><div class="input-value">${token}</div></div>
                    <div class="hidden-box"><div class="hidden-value">h=${hiddens[i].toFixed(2)}</div></div>
                    <div class="output-box"><div class="output-value">y=${outputs[i].toFixed(2)}</div></div>
                `;
                flow.appendChild(step);
                if (i < sequence.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = 'flow-arrow';
                    arrow.textContent = '→';
                    flow.appendChild(arrow);
                }
            });
        }
        function updateStep() {
            createFlow();
            const descriptions = [
                '时间步 t=0：接收输入"我"，初始化隐藏状态 h₀，计算输出 y₀。',
                '时间步 t=1：接收输入"爱"，结合 h₀ 计算新隐藏状态 h₁，输出 y₁。',
                '时间步 t=2：接收输入"学"，结合 h₁ 计算新隐藏状态 h₂，输出 y₂。',
                '时间步 t=3：接收输入"习"，结合 h₂ 计算最终隐藏状态 h₃，输出预测结果 y₃。'
            ];
            document.getElementById('explanation').innerHTML = `<h3>时间步 t=${currentStep}</h3><p>${descriptions[currentStep]}</p>`;
            document.querySelectorAll('.step-dot').forEach((dot, i) => dot.classList.toggle('active', i === currentStep));
            currentStep = (currentStep + 1) % sequence.length;
        }
        initIndicator();
        updateStep();
        setInterval(updateStep, 3000);
    </script>
</body>
</html>
