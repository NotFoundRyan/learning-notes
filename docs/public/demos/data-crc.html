<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRC 校验计算</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100%;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            font-weight: 500;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Monaco', 'Consolas', monospace;
            background: white;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #999;
        }
        
        .hex-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        
        .hex-byte {
            padding: 6px 10px;
            background: #f0f0f0;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
        }
        
        .result-box {
            background: #333;
            color: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .result-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        
        .result-value {
            font-size: 32px;
            font-weight: 300;
            font-family: 'Monaco', 'Consolas', monospace;
            letter-spacing: 2px;
        }
        
        .result-binary {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 8px;
            font-family: 'Monaco', 'Consolas', monospace;
        }
        
        .crc-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        .crc-option {
            padding: 10px 16px;
            background: #e8e8e8;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        
        .crc-option:hover {
            background: #ddd;
        }
        
        .crc-option.active {
            background: #333;
            color: white;
            border-color: #333;
        }
        
        .process-steps {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .step {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }
        
        .step:last-child {
            border-bottom: none;
        }
        
        .step-operator {
            color: #666;
        }
        
        .step-result {
            color: #333;
            font-weight: 500;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
        }
        
        .info-value {
            font-family: 'Monaco', 'Consolas', monospace;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>CRC 校验计算</h2>
        
        <div class="card">
            <h3>输入数据</h3>
            <div class="input-group">
                <label>输入字符串</label>
                <input type="text" id="inputData" value="Hello" oninput="calculateCRC()">
            </div>
            <div class="hex-display" id="hexDisplay"></div>
        </div>
        
        <div class="card">
            <h3>选择 CRC 算法</h3>
            <div class="crc-select">
                <div class="crc-option active" onclick="selectCRC('sum')" id="opt-sum">累加和</div>
                <div class="crc-option" onclick="selectCRC('xor')" id="opt-xor">异或校验</div>
                <div class="crc-option" onclick="selectCRC('crc8')" id="opt-crc8">CRC-8</div>
                <div class="crc-option" onclick="selectCRC('crc16')" id="opt-crc16">CRC-16</div>
            </div>
            
            <div class="result-box">
                <div class="result-label">校验结果</div>
                <div class="result-value" id="crcResult">00</div>
                <div class="result-binary" id="crcBinary">00000000</div>
            </div>
        </div>
        
        <div class="card">
            <h3>计算过程</h3>
            <div class="process-steps" id="processSteps"></div>
        </div>
        
        <div class="card">
            <h3>算法说明</h3>
            <div class="info-row">
                <span class="info-label">当前算法</span>
                <span class="info-value" id="algoName">累加和</span>
            </div>
            <div class="info-row">
                <span class="info-label">多项式</span>
                <span class="info-value" id="polynomial">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">初始值</span>
                <span class="info-value" id="initValue">0x00</span>
            </div>
            <div class="info-row">
                <span class="info-label">数据长度</span>
                <span class="info-value" id="dataLength">5 字节</span>
            </div>
        </div>
    </div>

    <script>
        let currentCRC = 'sum';
        
        const crcInfo = {
            sum: { name: '累加和', poly: '-', init: '0x00' },
            xor: { name: '异或校验', poly: '-', init: '0x00' },
            crc8: { name: 'CRC-8', poly: '0x07', init: '0x00' },
            crc16: { name: 'CRC-16', poly: '0x8005', init: '0x0000' }
        };
        
        function selectCRC(type) {
            currentCRC = type;
            document.querySelectorAll('.crc-option').forEach(el => el.classList.remove('active'));
            document.getElementById('opt-' + type).classList.add('active');
            
            const info = crcInfo[type];
            document.getElementById('algoName').textContent = info.name;
            document.getElementById('polynomial').textContent = info.poly;
            document.getElementById('initValue').textContent = info.init;
            
            calculateCRC();
        }
        
        function calculateCRC() {
            const input = document.getElementById('inputData').value;
            const bytes = new TextEncoder().encode(input);
            
            const hexDisplay = document.getElementById('hexDisplay');
            hexDisplay.innerHTML = Array.from(bytes).map(b => 
                `<span class="hex-byte">${b.toString(16).toUpperCase().padStart(2, '0')}</span>`
            ).join('');
            
            document.getElementById('dataLength').textContent = bytes.length + ' 字节';
            
            let result;
            let steps = [];
            
            switch (currentCRC) {
                case 'sum':
                    result = calculateSum(bytes, steps);
                    break;
                case 'xor':
                    result = calculateXor(bytes, steps);
                    break;
                case 'crc8':
                    result = calculateCRC8(bytes, steps);
                    break;
                case 'crc16':
                    result = calculateCRC16(bytes, steps);
                    break;
            }
            
            const hexResult = result.toString(16).toUpperCase().padStart(currentCRC === 'crc16' ? 4 : 2, '0');
            const binaryResult = result.toString(2).padStart(currentCRC === 'crc16' ? 16 : 8, '0');
            
            document.getElementById('crcResult').textContent = hexResult;
            document.getElementById('crcBinary').textContent = binaryResult;
            
            const stepsContainer = document.getElementById('processSteps');
            stepsContainer.innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');
        }
        
        function calculateSum(bytes, steps) {
            let sum = 0;
            bytes.forEach((b, i) => {
                const prev = sum;
                sum = (sum + b) & 0xFF;
                steps.push(`[${i}] ${prev.toString(16).padStart(2, '0')} + ${b.toString(16).padStart(2, '0')} = ${sum.toString(16).padStart(2, '0')}`);
            });
            steps.push(`<span class="step-result">最终结果: 0x${sum.toString(16).toUpperCase().padStart(2, '0')}</span>`);
            return sum;
        }
        
        function calculateXor(bytes, steps) {
            let xor = 0;
            bytes.forEach((b, i) => {
                const prev = xor;
                xor = xor ^ b;
                steps.push(`[${i}] ${prev.toString(16).padStart(2, '0')} ^ ${b.toString(16).padStart(2, '0')} = ${xor.toString(16).padStart(2, '0')}`);
            });
            steps.push(`<span class="step-result">最终结果: 0x${xor.toString(16).toUpperCase().padStart(2, '0')}</span>`);
            return xor;
        }
        
        function calculateCRC8(bytes, steps) {
            let crc = 0;
            const poly = 0x07;
            
            bytes.forEach((b, i) => {
                crc ^= b;
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x80) {
                        crc = ((crc << 1) ^ poly) & 0xFF;
                    } else {
                        crc = (crc << 1) & 0xFF;
                    }
                }
                steps.push(`[${i}] 处理 0x${b.toString(16).padStart(2, '0')} → CRC = 0x${crc.toString(16).padStart(2, '0')}`);
            });
            steps.push(`<span class="step-result">最终结果: 0x${crc.toString(16).toUpperCase().padStart(2, '0')}</span>`);
            return crc;
        }
        
        function calculateCRC16(bytes, steps) {
            let crc = 0;
            const poly = 0x8005;
            
            bytes.forEach((b, i) => {
                crc ^= (b << 8);
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x8000) {
                        crc = ((crc << 1) ^ poly) & 0xFFFF;
                    } else {
                        crc = (crc << 1) & 0xFFFF;
                    }
                }
                steps.push(`[${i}] 处理 0x${b.toString(16).padStart(2, '0')} → CRC = 0x${crc.toString(16).padStart(4, '0')}`);
            });
            steps.push(`<span class="step-result">最终结果: 0x${crc.toString(16).toUpperCase().padStart(4, '0')}</span>`);
            return crc;
        }
        
        calculateCRC();
    </script>
</body>
</html>
