<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDP/TCP 对比演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .container { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 2%; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #333; margin-bottom: 1%; font-size: clamp(14px, 2vw, 24px); }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 1%; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .step-dot.active { background: #333; transform: scale(1.2); }
        .protocol-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5%; flex: 1; min-height: 0; }
        @media (max-width: 600px) { .protocol-compare { grid-template-columns: 1fr; } }
        .protocol-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 12px; padding: 2%; display: flex; flex-direction: column; }
        .protocol-header { text-align: center; margin-bottom: 1.5%; }
        .protocol-name { font-size: clamp(16px, 2vw, 24px); font-weight: 600; margin-bottom: 0.5%; }
        .protocol-desc { font-size: clamp(10px, 1.1vw, 12px); color: #666; }
        .packet-flow { background: #fafafa; border-radius: 8px; padding: 1.5%; flex: 1; min-height: 0; position: relative; margin-bottom: 1.5%; overflow: hidden; }
        .endpoint { position: absolute; top: 5%; padding: 4px 8px; background: #333; color: white; border-radius: 4px; font-size: clamp(9px, 1vw, 11px); font-weight: 500; }
        .endpoint.left { left: 5%; }
        .endpoint.right { right: 5%; }
        .packet { position: absolute; left: 50%; transform: translateX(-50%); padding: 4px 12px; background: #e8e8e8; border-radius: 4px; font-size: clamp(9px, 1vw, 11px); font-family: 'Monaco', 'Consolas', monospace; animation: packetMove 1s ease forwards; opacity: 0; white-space: nowrap; }
        .packet.send { background: #666; color: white; }
        .packet.ack { background: #999; color: white; }
        .packet.lost { background: #ccc; text-decoration: line-through; opacity: 0.5; }
        @keyframes packetMove { 0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0.3; } }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1%; }
        .stat-item { text-align: center; padding: 1.5%; background: #fafafa; border-radius: 8px; }
        .stat-value { font-size: clamp(14px, 1.8vw, 20px); font-weight: 600; color: #333; }
        .stat-label { font-size: clamp(9px, 1vw, 10px); color: #666; margin-top: 0.5%; }
        .explanation { padding: 1.5%; background: #fff; border-left: 4px solid #333; border-radius: 0 8px 8px 0; margin-top: 1%; }
        .explanation h3 { color: #333; margin-bottom: 0.5%; font-size: clamp(12px, 1.3vw, 14px); }
        .explanation p { color: #666; font-size: clamp(10px, 1.2vw, 13px); line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UDP/TCP 对比演示</h1>
        <div class="step-indicator" id="stepIndicator"></div>
        <div class="protocol-compare">
            <div class="protocol-card">
                <div class="protocol-header">
                    <div class="protocol-name">UDP</div>
                    <div class="protocol-desc">User Datagram Protocol - 无连接</div>
                </div>
                <div class="packet-flow" id="udpFlow">
                    <div class="endpoint left">发送端</div>
                    <div class="endpoint right">接收端</div>
                </div>
                <div class="stats">
                    <div class="stat-item"><div class="stat-value" id="udpSent">0</div><div class="stat-label">已发送</div></div>
                    <div class="stat-item"><div class="stat-value" id="udpLost">0</div><div class="stat-label">丢失</div></div>
                    <div class="stat-item"><div class="stat-value" id="udpTime">0ms</div><div class="stat-label">延迟</div></div>
                </div>
            </div>
            <div class="protocol-card">
                <div class="protocol-header">
                    <div class="protocol-name">TCP</div>
                    <div class="protocol-desc">Transmission Control Protocol - 面向连接</div>
                </div>
                <div class="packet-flow" id="tcpFlow">
                    <div class="endpoint left">发送端</div>
                    <div class="endpoint right">接收端</div>
                </div>
                <div class="stats">
                    <div class="stat-item"><div class="stat-value" id="tcpSent">0</div><div class="stat-label">已发送</div></div>
                    <div class="stat-item"><div class="stat-value" id="tcpRetrans">0</div><div class="stat-label">重传</div></div>
                    <div class="stat-item"><div class="stat-value" id="tcpTime">0ms</div><div class="stat-label">延迟</div></div>
                </div>
            </div>
        </div>
        <div class="explanation" id="explanation"><h3>UDP 发送</h3><p>UDP 直接发送数据包，无需建立连接。延迟低（~10ms），但不保证送达。</p></div>
    </div>
    <script>
        let udpStats = { sent: 0, lost: 0 };
        let tcpStats = { sent: 0, retrans: 0 };
        let packetId = 0;
        let currentStep = 0;
        const steps = [
            { type: 'udp', desc: 'UDP 发送', detail: 'UDP 直接发送数据包，无需建立连接。延迟低（~10ms），但不保证送达。' },
            { type: 'udp-loss', desc: 'UDP 丢包', detail: 'UDP 不保证可靠性，数据包可能丢失。发送端无法得知是否送达。' },
            { type: 'tcp', desc: 'TCP 三次握手', detail: 'TCP 需要先建立连接：SYN → SYN-ACK → ACK。开销大但可靠。' },
            { type: 'tcp-loss', desc: 'TCP 重传', detail: 'TCP 检测到丢包后自动重传，保证数据可靠送达。延迟增加（~50ms）。' }
        ];
        function initIndicator() {
            const indicator = document.getElementById('stepIndicator');
            steps.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'step-dot' + (i === 0 ? ' active' : '');
                indicator.appendChild(dot);
            });
        }
        function createPacket(text, type) {
            const packet = document.createElement('div');
            packet.className = 'packet ' + type;
            packet.textContent = text;
            return packet;
        }
        function sendUDP(withLoss = false) {
            const flow = document.getElementById('udpFlow');
            const id = ++packetId;
            const packet = createPacket('DATA-' + id, 'send');
            const topPos = 15 + (udpStats.sent % 4) * 20;
            packet.style.top = topPos + '%';
            flow.appendChild(packet);
            udpStats.sent++;
            document.getElementById('udpSent').textContent = udpStats.sent;
            if (withLoss) {
                packet.classList.add('lost');
                udpStats.lost++;
                document.getElementById('udpLost').textContent = udpStats.lost;
            }
            document.getElementById('udpTime').textContent = '~10ms';
            setTimeout(() => packet.remove(), 2000);
        }
        function sendTCP(withLoss = false) {
            const flow = document.getElementById('tcpFlow');
            const id = ++packetId;
            const syn = createPacket('SYN', 'send');
            syn.style.top = '15%';
            flow.appendChild(syn);
            setTimeout(() => {
                const synAck = createPacket('SYN-ACK', 'ack');
                synAck.style.top = '30%';
                flow.appendChild(synAck);
                setTimeout(() => {
                    const ack = createPacket('ACK', 'send');
                    ack.style.top = '45%';
                    flow.appendChild(ack);
                    setTimeout(() => {
                        const data = createPacket('DATA-' + id, 'send');
                        data.style.top = '60%';
                        flow.appendChild(data);
                        tcpStats.sent++;
                        document.getElementById('tcpSent').textContent = tcpStats.sent;
                        if (withLoss) {
                            data.classList.add('lost');
                            setTimeout(() => {
                                const retrans = createPacket('DATA-' + id + '(R)', 'send');
                                retrans.style.top = '75%';
                                flow.appendChild(retrans);
                                tcpStats.retrans++;
                                document.getElementById('tcpRetrans').textContent = tcpStats.retrans;
                                setTimeout(() => retrans.remove(), 2000);
                            }, 500);
                        }
                        setTimeout(() => {
                            const dataAck = createPacket('ACK', 'ack');
                            dataAck.style.top = '75%';
                            flow.appendChild(dataAck);
                            setTimeout(() => dataAck.remove(), 2000);
                        }, 300);
                        document.getElementById('tcpTime').textContent = '~50ms';
                        setTimeout(() => data.remove(), 2000);
                    }, 300);
                    setTimeout(() => ack.remove(), 2000);
                }, 300);
                setTimeout(() => synAck.remove(), 2000);
            }, 300);
            setTimeout(() => syn.remove(), 2000);
        }
        function runStep() {
            const step = steps[currentStep];
            document.querySelectorAll('.step-dot').forEach((dot, i) => dot.classList.toggle('active', i === currentStep));
            document.getElementById('explanation').innerHTML = `<h3>${step.desc}</h3><p>${step.detail}</p>`;
            if (step.type === 'udp') sendUDP(false);
            else if (step.type === 'udp-loss') sendUDP(true);
            else if (step.type === 'tcp') sendTCP(false);
            else if (step.type === 'tcp-loss') sendTCP(true);
            currentStep = (currentStep + 1) % steps.length;
        }
        initIndicator();
        runStep();
        setInterval(runStep, 3000);
    </script>
</body>
</html>
