<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通信协议演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .protocol-flow {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }
        
        .flow-step {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .flow-step.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateX(10px);
        }
        
        .flow-step .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .flow-step.active .step-number {
            background: white;
            color: #667eea;
        }
        
        .flow-step .step-content {
            flex: 1;
        }
        
        .flow-step .step-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .flow-step .step-desc {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .device-panel {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .device-panel {
                grid-template-columns: 1fr;
            }
        }
        
        .device {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
        }
        
        .device-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .device-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
        
        .device-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .device-log {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #00ff88;
        }
        
        .device-log .log-line {
            margin-bottom: 5px;
            padding: 3px 0;
        }
        
        .device-log .log-line.tx { color: #4fc3f7; }
        .device-log .log-line.rx { color: #81c784; }
        .device-log .log-line.error { color: #ff5252; }
        .device-log .log-line.info { color: #ffeb3b; }
        
        .connection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }
        
        .connection-line {
            width: 60px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .connection-line.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            animation: flowRight 1s linear infinite;
        }
        
        @keyframes flowRight {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }
        
        .command-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .command-btn {
            padding: 10px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .command-btn:hover {
            border-color: #667eea;
            background: white;
        }
        
        .command-btn .cmd-code {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #667eea;
        }
        
        .command-btn .cmd-name {
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 通信协议演示</h1>
        
        <div class="card">
            <h2>协议通信流程</h2>
            <div class="protocol-flow">
                <div class="flow-step" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-content">
                        <div class="step-title">客户端发送请求</div>
                        <div class="step-desc">构造数据帧，包含命令和数据</div>
                    </div>
                </div>
                <div class="flow-step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-content">
                        <div class="step-title">服务器接收并解析</div>
                        <div class="step-desc">验证帧格式和CRC校验</div>
                    </div>
                </div>
                <div class="flow-step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-content">
                        <div class="step-title">服务器处理命令</div>
                        <div class="step-desc">执行相应操作并准备响应</div>
                    </div>
                </div>
                <div class="flow-step" id="step4">
                    <div class="step-number">4</div>
                    <div class="step-content">
                        <div class="step-title">服务器发送响应</div>
                        <div class="step-desc">返回ACK/NACK和数据</div>
                    </div>
                </div>
                <div class="flow-step" id="step5">
                    <div class="step-number">5</div>
                    <div class="step-content">
                        <div class="step-title">客户端接收响应</div>
                        <div class="step-desc">处理返回数据，完成通信</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>设备通信模拟</h2>
            <div class="device-panel">
                <div class="device">
                    <div class="device-header">
                        <div class="device-icon">📱</div>
                        <div class="device-name">客户端 (Client)</div>
                    </div>
                    <div class="command-list">
                        <div class="command-btn" onclick="sendCommand(0x01)">
                            <div class="cmd-code">0x01</div>
                            <div class="cmd-name">读版本</div>
                        </div>
                        <div class="command-btn" onclick="sendCommand(0x02)">
                            <div class="cmd-code">0x02</div>
                            <div class="cmd-name">读状态</div>
                        </div>
                        <div class="command-btn" onclick="sendCommand(0x03)">
                            <div class="cmd-code">0x03</div>
                            <div class="cmd-name">设置配置</div>
                        </div>
                        <div class="command-btn" onclick="sendCommand(0x05)">
                            <div class="cmd-code">0x05</div>
                            <div class="cmd-name">读数据</div>
                        </div>
                    </div>
                    <div class="device-log" id="clientLog">
                        <div class="log-line info">客户端就绪</div>
                    </div>
                </div>
                
                <div class="connection">
                    <div class="connection-line" id="line1"></div>
                    <div style="font-size: 12px; color: #666;">通信链路</div>
                    <div class="connection-line" id="line2"></div>
                </div>
                
                <div class="device">
                    <div class="device-header">
                        <div class="device-icon">🖥️</div>
                        <div class="device-name">服务器 (Server)</div>
                    </div>
                    <div style="padding: 10px; background: #f8f9fa; border-radius: 8px; margin-bottom: 15px;">
                        <div style="font-size: 12px; color: #666;">服务器状态: <span id="serverStatus" style="color: #4caf50; font-weight: bold;">运行中</span></div>
                    </div>
                    <div class="device-log" id="serverLog">
                        <div class="log-line info">服务器就绪</div>
                    </div>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="txCount">0</div>
                    <div class="stat-label">发送帧数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="rxCount">0</div>
                    <div class="stat-label">接收帧数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="ackCount">0</div>
                    <div class="stat-label">ACK 次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="nackCount">0</div>
                    <div class="stat-label">NACK 次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="errorCount">0</div>
                    <div class="stat-label">错误次数</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sequence = 0;
        let txCount = 0;
        let rxCount = 0;
        let ackCount = 0;
        let nackCount = 0;
        let errorCount = 0;
        
        // 日志函数
        function log(deviceId, message, type = 'info') {
            const logElement = document.getElementById(deviceId);
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            logElement.appendChild(line);
            logElement.scrollTop = logElement.scrollHeight;
            
            while (logElement.children.length > 50) {
                logElement.removeChild(logElement.firstChild);
            }
        }
        
        // 激活流程步骤
        function activateStep(stepNum) {
            for (let i = 1; i <= 5; i++) {
                const step = document.getElementById(`step${i}`);
                if (i === stepNum) {
                    step.classList.add('active');
                } else {
                    step.classList.remove('active');
                }
            }
        }
        
        // 激活连接线
        function activateLine(direction) {
            const line = document.getElementById(direction === 'tx' ? 'line1' : 'line2');
            line.classList.add('active');
            setTimeout(() => line.classList.remove('active'), 1000);
        }
        
        // CRC16 计算
        function calculateCRC16(data) {
            let crc = 0xFFFF;
            for (let i = 0; i < data.length; i++) {
                crc ^= data[i];
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x0001) {
                        crc = (crc >> 1) ^ 0xA001;
                    } else {
                        crc >>= 1;
                    }
                }
            }
            return crc;
        }
        
        // 打包帧
        function packFrame(command, data = []) {
            const frame = [];
            frame.push(0xAA, 0x55);  // Header
            frame.push(data.length + 2);  // Length
            frame.push(++sequence);  // Sequence
            frame.push(command);  // Command
            data.forEach(b => frame.push(b));  // Data
            
            const crc = calculateCRC16(frame.slice(3));
            frame.push(crc & 0xFF, (crc >> 8) & 0xFF);  // CRC
            frame.push(0x0D);  // Tail
            
            return frame;
        }
        
        // 发送命令
        async function sendCommand(command) {
            const data = [];
            if (command === 0x03) {
                data.push(0x00, 0x01, 0x00, 0x64);  // Param ID + Value
            }
            
            const frame = packFrame(command, data);
            const frameHex = frame.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            
            // 步骤1: 客户端发送
            activateStep(1);
            log('clientLog', `TX: ${frameHex}`, 'tx');
            activateLine('tx');
            txCount++;
            updateStats();
            
            await delay(500);
            
            // 步骤2: 服务器接收
            activateStep(2);
            log('serverLog', `RX: ${frameHex}`, 'rx');
            rxCount++;
            updateStats();
            
            await delay(500);
            
            // 步骤3: 服务器处理
            activateStep(3);
            const response = processCommand(command, data);
            log('serverLog', `处理命令 0x${command.toString(16).toUpperCase().padStart(2, '0')}`, 'info');
            
            await delay(500);
            
            // 步骤4: 服务器响应
            activateStep(4);
            const responseFrame = packFrame(response.command, response.data);
            const responseHex = responseFrame.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            log('serverLog', `TX: ${responseHex}`, 'tx');
            activateLine('rx');
            txCount++;
            updateStats();
            
            await delay(500);
            
            // 步骤5: 客户端接收
            activateStep(5);
            log('clientLog', `RX: ${responseHex}`, 'rx');
            rxCount++;
            
            if (response.command === 0x80) {
                log('clientLog', '收到 ACK', 'info');
                ackCount++;
            } else {
                log('clientLog', '收到 NACK', 'error');
                nackCount++;
            }
            
            updateStats();
            
            await delay(300);
            activateStep(0);
        }
        
        // 处理命令
        function processCommand(command, data) {
            switch (command) {
                case 0x01:  // 读版本
                    return { command: 0x80, data: [0x01, 0x00, 0x00, 0x01] };
                case 0x02:  // 读状态
                    return { command: 0x80, data: [0x19, 0x28, 0x03, 0xE8, 0x64, 0x01] };
                case 0x03:  // 设置配置
                    return { command: 0x80, data: [sequence] };
                case 0x05:  // 读数据
                    return { command: 0x80, data: [0x01, 0x02, 0x03, 0x04, 0x05] };
                default:
                    return { command: 0x81, data: [0x03] };  // NACK: 未知命令
            }
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('txCount').textContent = txCount;
            document.getElementById('rxCount').textContent = rxCount;
            document.getElementById('ackCount').textContent = ackCount;
            document.getElementById('nackCount').textContent = nackCount;
            document.getElementById('errorCount').textContent = errorCount;
        }
        
        // 延迟函数
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
