<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回调函数演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .log-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .log-entry {
            padding: 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            animation: fadeIn 0.3s ease;
        }
        
        .log-entry.event {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
        }
        
        .log-entry.callback {
            background: #f3e5f5;
            border-left: 3px solid #9c27b0;
        }
        
        .log-entry.action {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .diagram {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .module {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .module.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }
        
        .arrow {
            font-size: 24px;
            color: #667eea;
            animation: pulse 1s ease infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .timer-display {
            font-size: 48px;
            text-align: center;
            font-family: 'Courier New', monospace;
            color: #667eea;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 回调函数演示</h1>
        
        <div class="card">
            <h2>回调函数工作原理</h2>
            <div class="diagram">
                <div class="module" id="module1">
                    <strong>模块 A</strong><br>
                    <small>事件源</small>
                </div>
                <div class="arrow">→</div>
                <div class="module" id="module2">
                    <strong>回调函数</strong><br>
                    <small>函数指针</small>
                </div>
                <div class="arrow">→</div>
                <div class="module" id="module3">
                    <strong>模块 B</strong><br>
                    <small>事件处理</small>
                </div>
            </div>
            <p style="color: #666; text-align: center;">
                模块 A 通过回调函数指针调用模块 B 的函数，实现模块解耦
            </p>
        </div>
        
        <div class="card">
            <h2>按键回调演示</h2>
            <div class="button-group">
                <button onclick="simulateKeyPress(0)">按键 0 按下</button>
                <button onclick="simulateKeyPress(1)">按键 1 按下</button>
                <button onclick="simulateLongPress(0)">按键 0 长按</button>
                <button onclick="simulateKeyPress(2)">按键 2 按下</button>
            </div>
            <div class="log-container" id="keyLog">
                <div class="log-entry event">等待按键事件...</div>
            </div>
        </div>
        
        <div class="card">
            <h2>定时器回调演示</h2>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <div class="button-group">
                <button onclick="startTimer()">启动定时器</button>
                <button onclick="stopTimer()">停止定时器</button>
                <button onclick="resetTimer()">重置定时器</button>
            </div>
            <div class="log-container" id="timerLog">
                <div class="log-entry event">定时器未启动</div>
            </div>
        </div>
        
        <div class="card">
            <h2>事件回调演示</h2>
            <div class="button-group">
                <button onclick="triggerEvent('temperature')">温度更新</button>
                <button onclick="triggerEvent('humidity')">湿度更新</button>
                <button onclick="triggerEvent('pressure')">气压更新</button>
                <button onclick="triggerEvent('error')">错误事件</button>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="tempValue">--</div>
                    <div class="stat-label">温度 (°C)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="humidValue">--</div>
                    <div class="stat-label">湿度 (%)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="pressValue">--</div>
                    <div class="stat-label">气压 (hPa)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="eventCount">0</div>
                    <div class="stat-label">事件计数</div>
                </div>
            </div>
            <div class="log-container" id="eventLog" style="margin-top: 20px;">
                <div class="log-entry event">等待事件...</div>
            </div>
        </div>
    </div>

    <script>
        // 日志记录函数
        function log(containerId, message, type = 'event') {
            const container = document.getElementById(containerId);
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            container.insertBefore(entry, container.firstChild);
            
            // 限制日志数量
            while (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }
        
        // 按键回调演示
        const keyCallbacks = {};
        
        function registerKeyCallback(keyId, callback) {
            keyCallbacks[keyId] = callback;
        }
        
        function simulateKeyPress(keyId) {
            log('keyLog', `按键 ${keyId} 按下`, 'event');
            
            document.getElementById('module1').classList.add('active');
            setTimeout(() => {
                document.getElementById('module1').classList.remove('active');
                document.getElementById('module2').classList.add('active');
            }, 300);
            
            setTimeout(() => {
                document.getElementById('module2').classList.remove('active');
                document.getElementById('module3').classList.add('active');
                
                if (keyCallbacks[keyId]) {
                    keyCallbacks[keyId](keyId, 'PRESS');
                }
            }, 600);
            
            setTimeout(() => {
                document.getElementById('module3').classList.remove('active');
            }, 900);
        }
        
        function simulateLongPress(keyId) {
            log('keyLog', `按键 ${keyId} 长按`, 'event');
            
            if (keyCallbacks[keyId]) {
                keyCallbacks[keyId](keyId, 'LONG_PRESS');
            }
        }
        
        // 注册按键回调
        registerKeyCallback(0, (id, event) => {
            log('keyLog', `回调执行: 按键 ${id} ${event === 'PRESS' ? '短按' : '长按'}`, 'callback');
            log('keyLog', `执行动作: 切换 LED`, 'action');
        });
        
        registerKeyCallback(1, (id, event) => {
            log('keyLog', `回调执行: 按键 ${id} 按下`, 'callback');
            log('keyLog', `执行动作: 发送数据`, 'action');
        });
        
        registerKeyCallback(2, (id, event) => {
            log('keyLog', `回调执行: 按键 ${id} 按下`, 'callback');
            log('keyLog', `执行动作: 系统复位`, 'action');
        });
        
        // 定时器回调演示
        let timerInterval = null;
        let timerSeconds = 0;
        let timerCallback = null;
        
        function updateTimerDisplay() {
            const hours = Math.floor(timerSeconds / 3600);
            const minutes = Math.floor((timerSeconds % 3600) / 60);
            const seconds = timerSeconds % 60;
            
            document.getElementById('timerDisplay').textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        
        function startTimer() {
            if (timerInterval) return;
            
            log('timerLog', '定时器启动', 'event');
            
            timerCallback = () => {
                timerSeconds++;
                updateTimerDisplay();
                
                // 每秒触发回调
                if (timerSeconds % 1 === 0) {
                    log('timerLog', `定时器回调: ${timerSeconds} 秒`, 'callback');
                }
                
                // 每 10 秒触发特殊回调
                if (timerSeconds % 10 === 0) {
                    log('timerLog', `定时器事件: 已运行 ${timerSeconds} 秒`, 'action');
                }
            };
            
            timerInterval = setInterval(timerCallback, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                log('timerLog', '定时器停止', 'event');
            }
        }
        
        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            updateTimerDisplay();
            log('timerLog', '定时器重置', 'event');
        }
        
        // 事件回调演示
        const eventCallbacks = {};
        let eventCount = 0;
        
        function registerEventCallback(eventName, callback) {
            eventCallbacks[eventName] = callback;
        }
        
        function triggerEvent(eventName) {
            eventCount++;
            document.getElementById('eventCount').textContent = eventCount;
            
            log('eventLog', `事件触发: ${eventName}`, 'event');
            
            if (eventCallbacks[eventName]) {
                const data = eventCallbacks[eventName]();
                log('eventLog', `回调执行: 处理 ${eventName} 数据`, 'callback');
            }
        }
        
        // 注册事件回调
        registerEventCallback('temperature', () => {
            const temp = (Math.random() * 10 + 20).toFixed(1);
            document.getElementById('tempValue').textContent = temp;
            log('eventLog', `更新温度: ${temp}°C`, 'action');
            return temp;
        });
        
        registerEventCallback('humidity', () => {
            const humid = (Math.random() * 20 + 40).toFixed(1);
            document.getElementById('humidValue').textContent = humid;
            log('eventLog', `更新湿度: ${humid}%`, 'action');
            return humid;
        });
        
        registerEventCallback('pressure', () => {
            const press = (Math.random() * 50 + 1000).toFixed(0);
            document.getElementById('pressValue').textContent = press;
            log('eventLog', `更新气压: ${press} hPa`, 'action');
            return press;
        });
        
        registerEventCallback('error', () => {
            log('eventLog', `错误处理: 发送警报`, 'action');
            return 'ERROR';
        });
        
        // 初始化
        updateTimerDisplay();
    </script>
</body>
</html>
