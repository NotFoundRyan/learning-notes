<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备通信模拟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d30 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .card {
            background: rgba(50, 50, 55, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 400;
        }
        
        .device-panel {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .device-panel {
                grid-template-columns: 1fr;
            }
        }
        
        .device {
            background: rgba(30, 30, 32, 0.8);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .device-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .device-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
        }
        
        .device-name {
            font-weight: 500;
            font-size: 16px;
            color: #fff;
        }
        
        .device-log {
            background: rgba(20, 20, 22, 0.9);
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #aaa;
        }
        
        .device-log .log-line {
            margin-bottom: 5px;
            padding: 3px 0;
        }
        
        .device-log .log-line.tx { color: #ccc; }
        .device-log .log-line.rx { color: #888; }
        .device-log .log-line.error { color: #ff6b6b; }
        .device-log .log-line.info { color: #666; }
        
        .connection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }
        
        .connection-line {
            width: 60px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .connection-line.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: flowRight 1s linear infinite;
        }
        
        @keyframes flowRight {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        button {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 400;
        }
        
        button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: rgba(30, 30, 32, 0.8);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 300;
            color: #fff;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }
        
        .command-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .command-btn {
            padding: 10px;
            background: rgba(30, 30, 32, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .command-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .command-btn .cmd-code {
            font-family: 'Courier New', monospace;
            font-weight: 500;
            color: #ccc;
        }
        
        .command-btn .cmd-name {
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>设备通信模拟</h1>
        
        <div class="card">
            <h2>设备通信模拟</h2>
            <div class="device-panel">
                <div class="device">
                    <div class="device-header">
                        <div class="device-icon">📱</div>
                        <div class="device-name">客户端 (Client)</div>
                    </div>
                    <div class="command-list">
                        <div class="command-btn" onclick="sendCommand(0x01)">
                            <div class="cmd-code">0x01</div>
                            <div class="cmd-name">读版本</div>
                        </div>
                        <div class="command-btn" onclick="sendCommand(0x02)">
                            <div class="cmd-code">0x02</div>
                            <div class="cmd-name">读状态</div>
                        </div>
                        <div class="command-btn" onclick="sendCommand(0x03)">
                            <div class="cmd-code">0x03</div>
                            <div class="cmd-name">设置配置</div>
                        </div>
                        <div class="command-btn" onclick="sendCommand(0x05)">
                            <div class="cmd-code">0x05</div>
                            <div class="cmd-name">读数据</div>
                        </div>
                    </div>
                    <div class="device-log" id="clientLog">
                        <div class="log-line info">客户端就绪</div>
                    </div>
                </div>
                
                <div class="connection">
                    <div class="connection-line" id="line1"></div>
                    <div style="font-size: 12px; color: #666;">通信链路</div>
                    <div class="connection-line" id="line2"></div>
                </div>
                
                <div class="device">
                    <div class="device-header">
                        <div class="device-icon">🖥️</div>
                        <div class="device-name">服务器 (Server)</div>
                    </div>
                    <div style="padding: 10px; background: rgba(30, 30, 32, 0.8); border-radius: 8px; margin-bottom: 15px;">
                        <div style="font-size: 12px; color: #666;">服务器状态: <span id="serverStatus" style="color: #aaa; font-weight: 500;">运行中</span></div>
                    </div>
                    <div class="device-log" id="serverLog">
                        <div class="log-line info">服务器就绪</div>
                    </div>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="txCount">0</div>
                    <div class="stat-label">发送帧数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="rxCount">0</div>
                    <div class="stat-label">接收帧数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="ackCount">0</div>
                    <div class="stat-label">ACK 次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="nackCount">0</div>
                    <div class="stat-label">NACK 次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="errorCount">0</div>
                    <div class="stat-label">错误次数</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sequence = 0;
        let txCount = 0;
        let rxCount = 0;
        let ackCount = 0;
        let nackCount = 0;
        let errorCount = 0;
        
        function log(deviceId, message, type = 'info') {
            const logElement = document.getElementById(deviceId);
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            logElement.appendChild(line);
            logElement.scrollTop = logElement.scrollHeight;
            
            while (logElement.children.length > 50) {
                logElement.removeChild(logElement.firstChild);
            }
        }
        
        function activateLine(direction) {
            const line = document.getElementById(direction === 'tx' ? 'line1' : 'line2');
            line.classList.add('active');
            setTimeout(() => line.classList.remove('active'), 1000);
        }
        
        function calculateCRC16(data) {
            let crc = 0xFFFF;
            for (let i = 0; i < data.length; i++) {
                crc ^= data[i];
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x0001) {
                        crc = (crc >> 1) ^ 0xA001;
                    } else {
                        crc >>= 1;
                    }
                }
            }
            return crc;
        }
        
        function packFrame(command, data = []) {
            const frame = [];
            frame.push(0xAA, 0x55);
            frame.push(data.length + 2);
            frame.push(++sequence);
            frame.push(command);
            data.forEach(b => frame.push(b));
            
            const crc = calculateCRC16(frame.slice(3));
            frame.push(crc & 0xFF, (crc >> 8) & 0xFF);
            frame.push(0x0D);
            
            return frame;
        }
        
        async function sendCommand(command) {
            const data = [];
            if (command === 0x03) {
                data.push(0x00, 0x01, 0x00, 0x64);
            }
            
            const frame = packFrame(command, data);
            const frameHex = frame.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            
            log('clientLog', `TX: ${frameHex}`, 'tx');
            activateLine('tx');
            txCount++;
            updateStats();
            
            await delay(500);
            
            log('serverLog', `RX: ${frameHex}`, 'rx');
            rxCount++;
            updateStats();
            
            await delay(500);
            
            const response = processCommand(command, data);
            log('serverLog', `处理命令 0x${command.toString(16).toUpperCase().padStart(2, '0')}`, 'info');
            
            await delay(500);
            
            const responseFrame = packFrame(response.command, response.data);
            const responseHex = responseFrame.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
            log('serverLog', `TX: ${responseHex}`, 'tx');
            activateLine('rx');
            txCount++;
            updateStats();
            
            await delay(500);
            
            log('clientLog', `RX: ${responseHex}`, 'rx');
            rxCount++;
            
            if (response.command === 0x80) {
                log('clientLog', '收到 ACK', 'info');
                ackCount++;
            } else {
                log('clientLog', '收到 NACK', 'error');
                nackCount++;
            }
            
            updateStats();
        }
        
        function processCommand(command, data) {
            switch (command) {
                case 0x01:
                    return { command: 0x80, data: [0x01, 0x00, 0x00, 0x01] };
                case 0x02:
                    return { command: 0x80, data: [0x19, 0x28, 0x03, 0xE8, 0x64, 0x01] };
                case 0x03:
                    return { command: 0x80, data: [sequence] };
                case 0x05:
                    return { command: 0x80, data: [0x01, 0x02, 0x03, 0x04, 0x05] };
                default:
                    return { command: 0x81, data: [0x03] };
            }
        }
        
        function updateStats() {
            document.getElementById('txCount').textContent = txCount;
            document.getElementById('rxCount').textContent = rxCount;
            document.getElementById('ackCount').textContent = ackCount;
            document.getElementById('nackCount').textContent = nackCount;
            document.getElementById('errorCount').textContent = errorCount;
        }
        
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
