<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通信协议演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100%;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }
        
        .simulator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .simulator {
                grid-template-columns: 1fr;
            }
        }
        
        .node {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .node-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .node-icon {
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }
        
        .node-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .node-subtitle {
            font-size: 11px;
            color: #666;
        }
        
        .terminal {
            background: #fafafa;
            border-radius: 8px;
            padding: 12px;
            min-height: 150px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            margin-bottom: 12px;
        }
        
        .terminal-line {
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }
        
        .terminal-line:last-child {
            border-bottom: none;
        }
        
        .terminal-tx { color: #333; }
        .terminal-rx { color: #666; }
        .terminal-info { color: #999; font-style: italic; }
        
        .input-row {
            display: flex;
            gap: 8px;
        }
        
        .input-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .input-row input:focus {
            outline: none;
            border-color: #999;
        }
        
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: #333;
            color: white;
        }
        
        .btn-primary:hover {
            background: #555;
        }
        
        .channel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .channel-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .channel-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
        }
        
        .channel-node {
            width: 60px;
            height: 60px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .channel-line {
            flex: 1;
            height: 4px;
            background: #ddd;
            position: relative;
            max-width: 200px;
        }
        
        .channel-packet {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #666;
            border-radius: 50%;
            top: -8px;
            animation: movePacket 1s ease-in-out;
        }
        
        @keyframes movePacket {
            0% { left: 0; }
            100% { left: calc(100% - 20px); }
        }
        
        .protocol-info {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .protocol-info h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .frame-structure {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding: 10px 0;
        }
        
        .frame-field {
            padding: 12px 16px;
            background: #fafafa;
            border-radius: 6px;
            text-align: center;
            min-width: 60px;
        }
        
        .frame-field.header { background: #333; color: white; }
        .frame-field.data { background: #e8e8e8; }
        .frame-field.crc { background: #888; color: white; }
        
        .frame-field-name {
            font-size: 10px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .frame-field.header .frame-field-name,
        .frame-field.crc .frame-field-name {
            color: rgba(255,255,255,0.7);
        }
        
        .frame-field-value {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>通信协议演示</h2>
        
        <div class="simulator">
            <div class="node">
                <div class="node-header">
                    <div class="node-icon">A</div>
                    <div>
                        <div class="node-title">节点 A</div>
                        <div class="node-subtitle">主设备 (Master)</div>
                    </div>
                </div>
                <div class="terminal" id="terminalA">
                    <div class="terminal-line terminal-info">等待发送数据...</div>
                </div>
                <div class="input-row">
                    <input type="text" id="inputA" placeholder="输入要发送的数据" onkeypress="if(event.key==='Enter')sendFromA()">
                    <button class="btn btn-primary" onclick="sendFromA()">发送</button>
                </div>
            </div>
            
            <div class="node">
                <div class="node-header">
                    <div class="node-icon">B</div>
                    <div>
                        <div class="node-title">节点 B</div>
                        <div class="node-subtitle">从设备 (Slave)</div>
                    </div>
                </div>
                <div class="terminal" id="terminalB">
                    <div class="terminal-line terminal-info">等待接收数据...</div>
                </div>
                <div class="input-row">
                    <input type="text" id="inputB" placeholder="输入要回复的数据" onkeypress="if(event.key==='Enter')sendFromB()">
                    <button class="btn btn-primary" onclick="sendFromB()">回复</button>
                </div>
            </div>
        </div>
        
        <div class="channel">
            <div class="channel-title">通信通道</div>
            <div class="channel-visual">
                <div class="channel-node">A</div>
                <div class="channel-line" id="channelLine"></div>
                <div class="channel-node">B</div>
            </div>
        </div>
        
        <div class="protocol-info">
            <h3>数据帧结构</h3>
            <div class="frame-structure" id="frameStructure">
                <div class="frame-field header">
                    <div class="frame-field-name">帧头</div>
                    <div class="frame-field-value">0xAA</div>
                </div>
                <div class="frame-field">
                    <div class="frame-field-name">长度</div>
                    <div class="frame-field-value" id="frameLen">--</div>
                </div>
                <div class="frame-field data">
                    <div class="frame-field-name">数据</div>
                    <div class="frame-field-value" id="frameData">--</div>
                </div>
                <div class="frame-field crc">
                    <div class="frame-field-name">校验</div>
                    <div class="frame-field-value" id="frameCrc">--</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let packetId = 0;
        
        function log(terminalId, message, type = 'info') {
            const terminal = document.getElementById(terminalId);
            const line = document.createElement('div');
            line.className = 'terminal-line terminal-' + type;
            
            const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            line.textContent = `[${time}] ${message}`;
            
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
            
            while (terminal.children.length > 20) {
                terminal.removeChild(terminal.firstChild);
            }
        }
        
        function animatePacket() {
            const line = document.getElementById('channelLine');
            const packet = document.createElement('div');
            packet.className = 'channel-packet';
            line.appendChild(packet);
            setTimeout(() => packet.remove(), 1000);
        }
        
        function calculateCRC(data) {
            let sum = 0xAA;
            for (const c of data) {
                sum += c.charCodeAt(0);
            }
            return (sum & 0xFF).toString(16).toUpperCase().padStart(2, '0');
        }
        
        function updateFrameDisplay(data) {
            document.getElementById('frameLen').textContent = data.length.toString(16).toUpperCase().padStart(2, '0');
            document.getElementById('frameData').textContent = data.substring(0, 8) + (data.length > 8 ? '...' : '');
            document.getElementById('frameCrc').textContent = calculateCRC(data);
        }
        
        function sendFromA() {
            const input = document.getElementById('inputA');
            const data = input.value.trim();
            if (!data) return;
            
            const id = ++packetId;
            log('terminalA', `TX: "${data}" (ID: ${id})`, 'tx');
            updateFrameDisplay(data);
            animatePacket();
            
            setTimeout(() => {
                log('terminalB', `RX: "${data}" (ID: ${id})`, 'rx');
            }, 500);
            
            input.value = '';
        }
        
        function sendFromB() {
            const input = document.getElementById('inputB');
            const data = input.value.trim();
            if (!data) return;
            
            const id = ++packetId;
            log('terminalB', `TX: "${data}" (ID: ${id})`, 'tx');
            updateFrameDisplay(data);
            animatePacket();
            
            setTimeout(() => {
                log('terminalA', `RX: "${data}" (ID: ${id})`, 'rx');
            }, 500);
            
            input.value = '';
        }
    </script>
</body>
</html>
