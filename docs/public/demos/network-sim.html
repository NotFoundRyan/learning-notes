<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络通信模拟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d30 100%);
            min-height: 100vh;
            padding: 24px;
            color: #e0e0e0;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #fff; margin-bottom: 24px; font-size: 1.8em; font-weight: 400; }
        .card {
            background: rgba(50, 50, 55, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .card h2 { color: #fff; margin-bottom: 20px; font-size: 1.2em; font-weight: 500; }
        .network-simulator {
            position: relative;
            padding: 40px 20px;
            background: rgba(60, 60, 65, 0.5);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .devices { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .device {
            width: 150px;
            padding: 20px;
            background: rgba(60, 60, 65, 0.8);
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .device.active { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .device-icon { font-size: 40px; margin-bottom: 10px; }
        .device-name { font-weight: 500; font-size: 14px; color: #b0b0b0; }
        .network-path { flex: 1; height: 80px; position: relative; display: flex; align-items: center; justify-content: center; }
        .path-line { position: absolute; width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
        .packet {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0;
            transition: all 0.5s ease;
        }
        .packet.sending { opacity: 1; animation: sendPacket 1s ease forwards; }
        @keyframes sendPacket { 0% { left: 0; opacity: 1; } 100% { left: calc(100% - 40px); opacity: 1; } }
        .packet.ack { animation: sendAck 1s ease forwards; }
        @keyframes sendAck { 0% { right: 0; left: auto; opacity: 1; } 100% { right: calc(100% - 40px); opacity: 1; } }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        button {
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(60, 60, 65, 0.8);
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover { background: rgba(80, 80, 85, 0.9); border-color: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .log-container {
            background: rgba(25, 25, 30, 0.9);
            border-radius: 8px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 12px;
            color: #888;
        }
        .log-entry { padding: 6px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .log-entry.udp { color: #aaa; }
        .log-entry.tcp { color: #ccc; }
        .log-entry.error { color: #f88; }
        .log-entry.info { color: #aaa; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(60, 60, 65, 0.8); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: 300; color: #fff; }
        .stat-label { font-size: 11px; color: #888; margin-top: 5px; }
        .connection-state { display: flex; align-items: center; gap: 10px; padding: 10px 15px; background: rgba(60, 60, 65, 0.8); border-radius: 8px; margin-bottom: 15px; }
        .state-indicator { width: 12px; height: 12px; border-radius: 50%; background: #555; }
        .state-indicator.connected { background: #8f8; animation: pulse 1s infinite; }
        .state-indicator.connecting { background: #ff8; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .handshake-steps { display: flex; flex-direction: column; gap: 15px; }
        .handshake-step { padding: 15px; background: rgba(60, 60, 65, 0.8); border-radius: 8px; opacity: 0.3; transition: all 0.3s ease; border-left: 3px solid transparent; }
        .handshake-step.active { opacity: 1; transform: translateX(10px); border-left-color: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h1>网络通信模拟</h1>
        <div class="card">
            <h2>UDP/TCP 通信演示</h2>
            <div class="connection-state">
                <div class="state-indicator" id="connectionIndicator"></div>
                <span id="connectionStatus">未连接</span>
            </div>
            <div class="network-simulator">
                <div class="devices">
                    <div class="device" id="client">
                        <div class="device-icon">📱</div>
                        <div class="device-name">客户端</div>
                    </div>
                    <div class="network-path">
                        <div class="path-line"></div>
                        <div class="packet" id="packet">📦</div>
                    </div>
                    <div class="device" id="server">
                        <div class="device-icon">🖥️</div>
                        <div class="device-name">服务器</div>
                    </div>
                </div>
            </div>
            <div class="button-group">
                <button onclick="sendUDP()">UDP 发送</button>
                <button onclick="sendUDPBroadcast()">UDP 广播</button>
                <button onclick="tcpConnect()">TCP 连接</button>
                <button onclick="tcpSend()" id="tcpSendBtn" disabled>TCP 发送</button>
                <button onclick="tcpDisconnect()">TCP 断开</button>
            </div>
            <div class="log-container" id="networkLog"><div class="log-entry info">网络模拟器就绪</div></div>
            <div class="stats">
                <div class="stat-item"><div class="stat-value" id="udpPackets">0</div><div class="stat-label">UDP 包</div></div>
                <div class="stat-item"><div class="stat-value" id="tcpPackets">0</div><div class="stat-label">TCP 包</div></div>
                <div class="stat-item"><div class="stat-value" id="connections">0</div><div class="stat-label">TCP 连接</div></div>
            </div>
        </div>
        <div class="card">
            <h2>TCP 三次握手</h2>
            <div class="handshake-steps">
                <div class="handshake-step" id="step1"><strong>1. SYN</strong> - 客户端发送连接请求</div>
                <div class="handshake-step" id="step2"><strong>2. SYN+ACK</strong> - 服务器确认并发送连接请求</div>
                <div class="handshake-step" id="step3"><strong>3. ACK</strong> - 客户端确认，连接建立</div>
            </div>
            <div style="margin-top: 20px;"><button onclick="simulateHandshake()">模拟三次握手</button></div>
        </div>
    </div>
    <script>
        let udpPackets = 0, tcpPackets = 0, connections = 0, tcpConnected = false;
        function log(message, type = 'info') {
            const logElement = document.getElementById('networkLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logElement.appendChild(entry);
            logElement.scrollTop = logElement.scrollHeight;
            while (logElement.children.length > 50) logElement.removeChild(logElement.firstChild);
        }
        function updateStats() {
            document.getElementById('udpPackets').textContent = udpPackets;
            document.getElementById('tcpPackets').textContent = tcpPackets;
            document.getElementById('connections').textContent = connections;
        }
        function updateConnectionState(state) {
            const indicator = document.getElementById('connectionIndicator');
            const status = document.getElementById('connectionStatus');
            indicator.className = 'state-indicator';
            if (state === 'connected') { indicator.classList.add('connected'); status.textContent = 'TCP 已连接'; document.getElementById('tcpSendBtn').disabled = false; }
            else if (state === 'connecting') { indicator.classList.add('connecting'); status.textContent = 'TCP 连接中...'; }
            else { status.textContent = '未连接'; document.getElementById('tcpSendBtn').disabled = true; }
        }
        async function sendPacketAnimation(isAck = false) {
            const packet = document.getElementById('packet');
            const client = document.getElementById('client');
            const server = document.getElementById('server');
            packet.className = 'packet' + (isAck ? ' ack' : ' sending');
            client.classList.add('active');
            await delay(500);
            client.classList.remove('active');
            await delay(500);
            server.classList.add('active');
            await delay(300);
            server.classList.remove('active');
            packet.className = 'packet';
        }
        async function sendUDP() { log('UDP: 发送数据包', 'udp'); await sendPacketAnimation(); log('UDP: 数据包已发送 (无确认)', 'udp'); udpPackets++; updateStats(); }
        async function sendUDPBroadcast() { log('UDP: 发送广播数据包', 'udp'); await sendPacketAnimation(); log('UDP: 广播已发送到所有设备', 'udp'); udpPackets++; updateStats(); }
        async function tcpConnect() {
            if (tcpConnected) { log('TCP: 已连接', 'error'); return; }
            updateConnectionState('connecting');
            log('TCP: 开始三次握手', 'tcp');
            log('TCP: 发送 SYN', 'tcp'); await sendPacketAnimation();
            await delay(200); log('TCP: 收到 SYN+ACK', 'tcp'); await sendPacketAnimation(true);
            await delay(200); log('TCP: 发送 ACK', 'tcp'); await sendPacketAnimation();
            tcpConnected = true; connections++; updateConnectionState('connected'); log('TCP: 连接建立成功', 'tcp'); updateStats();
        }
        async function tcpSend() {
            if (!tcpConnected) { log('TCP: 未连接', 'error'); return; }
            log('TCP: 发送数据', 'tcp'); await sendPacketAnimation();
            await delay(300); log('TCP: 收到 ACK，数据确认', 'tcp'); await sendPacketAnimation(true);
            tcpPackets++; updateStats();
        }
        async function tcpDisconnect() {
            if (!tcpConnected) { log('TCP: 未连接', 'error'); return; }
            log('TCP: 开始四次挥手', 'tcp');
            log('TCP: 发送 FIN', 'tcp'); await sendPacketAnimation();
            await delay(200); log('TCP: 收到 ACK', 'tcp'); await sendPacketAnimation(true);
            await delay(200); log('TCP: 收到 FIN', 'tcp'); await sendPacketAnimation();
            await delay(200); log('TCP: 发送 ACK', 'tcp'); await sendPacketAnimation(true);
            tcpConnected = false; updateConnectionState('disconnected'); log('TCP: 连接已关闭', 'tcp');
        }
        async function simulateHandshake() {
            ['step1', 'step2', 'step3'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById('step1').classList.add('active'); log('握手: 客户端发送 SYN', 'tcp'); await delay(1000);
            document.getElementById('step2').classList.add('active'); log('握手: 服务器发送 SYN+ACK', 'tcp'); await delay(1000);
            document.getElementById('step3').classList.add('active'); log('握手: 客户端发送 ACK', 'tcp'); log('握手: 连接建立成功！', 'info');
        }
        function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        updateConnectionState('disconnected');
    </script>
</body>
</html>
