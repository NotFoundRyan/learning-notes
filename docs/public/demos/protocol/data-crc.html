<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRC 校验计算</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .container { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 2%; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #333; margin-bottom: 1%; font-size: clamp(14px, 2vw, 24px); }
        .mode-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 1%; }
        .mode-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .mode-dot.active { background: #333; transform: scale(1.2); }
        .cards { flex: 1; min-height: 0; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5%; }
        @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }
        .card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 12px; padding: 2%; display: flex; flex-direction: column; overflow: hidden; }
        .card h3 { font-size: clamp(11px, 1.2vw, 14px); color: #666; margin-bottom: 1.5%; font-weight: 500; }
        .hex-display { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1.5%; }
        .hex-byte { padding: 4px 8px; background: #f0f0f0; border-radius: 4px; font-family: 'Monaco', 'Consolas', monospace; font-size: clamp(10px, 1.1vw, 13px); }
        .result-box { background: #333; color: white; border-radius: 8px; padding: 2%; text-align: center; margin-top: auto; }
        .result-label { font-size: clamp(10px, 1vw, 12px); opacity: 0.7; margin-bottom: 0.5%; }
        .result-value { font-size: clamp(20px, 2.5vw, 32px); font-weight: 300; font-family: 'Monaco', 'Consolas', monospace; letter-spacing: 2px; }
        .result-binary { font-size: clamp(9px, 1vw, 11px); opacity: 0.6; margin-top: 0.5%; font-family: 'Monaco', 'Consolas', monospace; }
        .process-steps { background: #fafafa; border-radius: 8px; padding: 2%; font-family: 'Monaco', 'Consolas', monospace; font-size: clamp(9px, 1vw, 12px); flex: 1; overflow-y: auto; min-height: 0; }
        .step { padding: 4px 0; border-bottom: 1px solid #eee; }
        .step:last-child { border-bottom: none; }
        .step-result { color: #333; font-weight: 500; }
        .info-row { display: flex; justify-content: space-between; padding: 1% 0; border-bottom: 1px solid #eee; font-size: clamp(10px, 1.1vw, 13px); }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #666; }
        .info-value { font-family: 'Monaco', 'Consolas', monospace; font-weight: 500; }
        .explanation { padding: 1.5%; background: #fff; border-left: 4px solid #333; border-radius: 0 8px 8px 0; margin-top: 1%; }
        .explanation h3 { color: #333; margin-bottom: 0.5%; font-size: clamp(12px, 1.3vw, 14px); }
        .explanation p { color: #666; font-size: clamp(10px, 1.2vw, 13px); line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CRC 校验计算</h1>
        <div class="mode-indicator" id="modeIndicator"></div>
        <div class="cards">
            <div class="card">
                <h3>输入数据</h3>
                <div class="hex-display" id="hexDisplay"></div>
                <div class="result-box">
                    <div class="result-label">校验结果</div>
                    <div class="result-value" id="crcResult">00</div>
                    <div class="result-binary" id="crcBinary">00000000</div>
                </div>
            </div>
            <div class="card">
                <h3>算法说明</h3>
                <div class="info-row"><span class="info-label">当前算法</span><span class="info-value" id="algoName">累加和</span></div>
                <div class="info-row"><span class="info-label">多项式</span><span class="info-value" id="polynomial">-</span></div>
                <div class="info-row"><span class="info-label">初始值</span><span class="info-value" id="initValue">0x00</span></div>
                <div class="info-row"><span class="info-label">数据长度</span><span class="info-value" id="dataLength">5 字节</span></div>
            </div>
            <div class="card" style="grid-column: 1 / -1;">
                <h3>计算过程</h3>
                <div class="process-steps" id="processSteps"></div>
            </div>
        </div>
        <div class="explanation" id="explanation"><h3>累加和校验</h3><p>将所有字节相加，取低 8 位作为校验值。简单高效，但检错能力有限。</p></div>
    </div>
    <script>
        const modes = [
            { type: 'sum', input: 'Hello', name: '累加和', poly: '-', init: '0x00', desc: '将所有字节相加，取低 8 位作为校验值。简单高效，但检错能力有限。' },
            { type: 'xor', input: 'World', name: '异或校验', poly: '-', init: '0x00', desc: '将所有字节异或，得到校验值。计算简单，能检测奇数位错误。' },
            { type: 'crc8', input: 'Data', name: 'CRC-8', poly: '0x07', init: '0x00', desc: '使用多项式 0x07 进行 CRC-8 计算。检错能力强，广泛应用于嵌入式通信。' },
            { type: 'crc16', input: 'Test', name: 'CRC-16', poly: '0x8005', init: '0x0000', desc: '使用多项式 0x8005 进行 CRC-16 计算。16 位校验，检错能力更强。' }
        ];
        let currentIdx = 0;
        function initIndicator() {
            const indicator = document.getElementById('modeIndicator');
            modes.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'mode-dot' + (i === 0 ? ' active' : '');
                indicator.appendChild(dot);
            });
        }
        function calculateCRC() {
            const mode = modes[currentIdx];
            const bytes = new TextEncoder().encode(mode.input);
            document.getElementById('hexDisplay').innerHTML = Array.from(bytes).map(b => `<span class="hex-byte">${b.toString(16).toUpperCase().padStart(2, '0')}</span>`).join('');
            document.getElementById('algoName').textContent = mode.name;
            document.getElementById('polynomial').textContent = mode.poly;
            document.getElementById('initValue').textContent = mode.init;
            document.getElementById('dataLength').textContent = bytes.length + ' 字节';
            let result, steps = [];
            switch (mode.type) {
                case 'sum': result = calculateSum(bytes, steps); break;
                case 'xor': result = calculateXor(bytes, steps); break;
                case 'crc8': result = calculateCRC8(bytes, steps); break;
                case 'crc16': result = calculateCRC16(bytes, steps); break;
            }
            const hexResult = result.toString(16).toUpperCase().padStart(mode.type === 'crc16' ? 4 : 2, '0');
            const binaryResult = result.toString(2).padStart(mode.type === 'crc16' ? 16 : 8, '0');
            document.getElementById('crcResult').textContent = hexResult;
            document.getElementById('crcBinary').textContent = binaryResult;
            document.getElementById('processSteps').innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');
            document.getElementById('explanation').innerHTML = `<h3>${mode.name}</h3><p>${mode.desc}</p>`;
            document.querySelectorAll('.mode-dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }
        function calculateSum(bytes, steps) {
            let sum = 0;
            bytes.forEach((b, i) => { const prev = sum; sum = (sum + b) & 0xFF; steps.push(`[${i}] ${prev.toString(16).padStart(2, '0')} + ${b.toString(16).padStart(2, '0')} = ${sum.toString(16).padStart(2, '0')}`); });
            steps.push(`<span class="step-result">最终结果: 0x${sum.toString(16).toUpperCase().padStart(2, '0')}</span>`);
            return sum;
        }
        function calculateXor(bytes, steps) {
            let xor = 0;
            bytes.forEach((b, i) => { const prev = xor; xor = xor ^ b; steps.push(`[${i}] ${prev.toString(16).padStart(2, '0')} ^ ${b.toString(16).padStart(2, '0')} = ${xor.toString(16).padStart(2, '0')}`); });
            steps.push(`<span class="step-result">最终结果: 0x${xor.toString(16).toUpperCase().padStart(2, '0')}</span>`);
            return xor;
        }
        function calculateCRC8(bytes, steps) {
            let crc = 0; const poly = 0x07;
            bytes.forEach((b, i) => { crc ^= b; for (let j = 0; j < 8; j++) { if (crc & 0x80) crc = ((crc << 1) ^ poly) & 0xFF; else crc = (crc << 1) & 0xFF; } steps.push(`[${i}] 处理 0x${b.toString(16).padStart(2, '0')} → CRC = 0x${crc.toString(16).padStart(2, '0')}`); });
            steps.push(`<span class="step-result">最终结果: 0x${crc.toString(16).toUpperCase().padStart(2, '0')}</span>`);
            return crc;
        }
        function calculateCRC16(bytes, steps) {
            let crc = 0; const poly = 0x8005;
            bytes.forEach((b, i) => { crc ^= (b << 8); for (let j = 0; j < 8; j++) { if (crc & 0x8000) crc = ((crc << 1) ^ poly) & 0xFFFF; else crc = (crc << 1) & 0xFFFF; } steps.push(`[${i}] 处理 0x${b.toString(16).padStart(2, '0')} → CRC = 0x${crc.toString(16).padStart(4, '0')}`); });
            steps.push(`<span class="step-result">最终结果: 0x${crc.toString(16).toUpperCase().padStart(4, '0')}</span>`);
            return crc;
        }
        initIndicator();
        calculateCRC();
        setInterval(() => { currentIdx = (currentIdx + 1) % modes.length; calculateCRC(); }, 3000);
    </script>
</body>
</html>
