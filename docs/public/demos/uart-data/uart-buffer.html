<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>串口缓冲区演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            padding: 2%;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            font-weight: 500;
        }
        
        .uart-simulator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .uart-simulator {
                grid-template-columns: 1fr;
            }
        }
        
        .terminal {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
            min-height: 180px;
            border: 1px solid #eee;
        }
        
        .terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ccc;
        }
        
        .terminal-title {
            color: #666;
            font-size: 11px;
            margin-left: auto;
        }
        
        .terminal-content {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .terminal-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .terminal-input input {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
        }
        
        .terminal-input input:focus {
            outline: none;
            border-color: #999;
        }
        
        .terminal-input button {
            padding: 10px 16px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .terminal-input button:hover {
            background: #555;
        }
        
        .buffer-visualizer {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #eee;
        }
        
        .buffer-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 12px;
            color: #666;
        }
        
        .buffer-diagram {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 10px 0;
        }
        
        .buffer-cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8e8e8;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .buffer-cell.filled {
            background: #666;
            color: white;
            border-color: #666;
        }
        
        .buffer-cell.head {
            border-color: #333;
            border-width: 3px;
        }
        
        .buffer-cell.tail {
            border-color: #999;
            border-width: 3px;
        }
        
        .buffer-pointer {
            padding: 4px 10px;
            background: #e8e8e8;
            color: #666;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .btn-write {
            background: #333;
            color: white;
        }
        
        .btn-write:hover {
            background: #555;
        }
        
        .btn-read {
            background: #666;
            color: white;
        }
        
        .btn-read:hover {
            background: #888;
        }
        
        .btn-clear {
            background: #e8e8e8;
            color: #333;
        }
        
        .btn-clear:hover {
            background: #ddd;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        
        .stat-item {
            background: #fafafa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #eee;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .stat-label {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>串口缓冲区演示</h2>
        
        <div class="card">
            <h3>串口终端模拟</h3>
            <div class="uart-simulator">
                <div class="terminal">
                    <div class="terminal-header">
                        <div class="terminal-dot"></div>
                        <div class="terminal-dot"></div>
                        <div class="terminal-dot"></div>
                        <div class="terminal-title">TX - 发送端</div>
                    </div>
                    <div class="terminal-content" id="txTerminal">
                        <div>准备发送数据...</div>
                    </div>
                    <div class="terminal-input">
                        <input type="text" id="txInput" placeholder="输入要发送的数据" onkeypress="if(event.key==='Enter')sendData()">
                        <button onclick="sendData()">发送</button>
                    </div>
                </div>
                
                <div class="terminal">
                    <div class="terminal-header">
                        <div class="terminal-dot"></div>
                        <div class="terminal-dot"></div>
                        <div class="terminal-dot"></div>
                        <div class="terminal-title">RX - 接收端</div>
                    </div>
                    <div class="terminal-content" id="rxTerminal">
                        <div>等待接收数据...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>环形缓冲区可视化</h3>
            <div class="buffer-visualizer">
                <div class="buffer-header">
                    <span>缓冲区大小: <strong>16</strong> 字节</span>
                    <span>已用: <strong id="bufferUsed">0</strong> 字节</span>
                </div>
                <div class="buffer-diagram" id="bufferDiagram"></div>
                <div style="display: flex; gap: 20px; margin-top: 12px; font-size: 11px; color: #666;">
                    <div><span class="buffer-pointer" style="background: #333; color: white;">Head</span> 写入位置</div>
                    <div><span class="buffer-pointer" style="background: #999; color: white;">Tail</span> 读取位置</div>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-write" onclick="writeToBuffer(0x41)">写入 'A'</button>
                <button class="btn-write" onclick="writeToBuffer(0x42)">写入 'B'</button>
                <button class="btn-write" onclick="writeToBuffer(0x43)">写入 'C'</button>
                <button class="btn-write" onclick="writeRandomByte()">随机写入</button>
                <button class="btn-read" onclick="readFromBuffer()">读取一字节</button>
                <button class="btn-clear" onclick="clearBuffer()">清空缓冲区</button>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="writeCount">0</div>
                    <div class="stat-label">写入次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="readCount">0</div>
                    <div class="stat-label">读取次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="overflowCount">0</div>
                    <div class="stat-label">溢出次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="bufferUsage">0%</div>
                    <div class="stat-label">使用率</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BUFFER_SIZE = 16;
        let buffer = new Array(BUFFER_SIZE).fill(0);
        let head = 0;
        let tail = 0;
        let count = 0;
        let writeCount = 0;
        let readCount = 0;
        let overflowCount = 0;
        
        function initBufferDisplay() {
            const diagram = document.getElementById('bufferDiagram');
            diagram.innerHTML = '';
            
            for (let i = 0; i < BUFFER_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'buffer-cell';
                cell.id = `cell-${i}`;
                cell.textContent = '--';
                diagram.appendChild(cell);
            }
            
            updateBufferDisplay();
        }
        
        function updateBufferDisplay() {
            for (let i = 0; i < BUFFER_SIZE; i++) {
                const cell = document.getElementById(`cell-${i}`);
                cell.className = 'buffer-cell';
                
                let isFilled = false;
                if (count > 0) {
                    if (head > tail) {
                        isFilled = i >= tail && i < head;
                    } else {
                        isFilled = i >= tail || i < head;
                    }
                }
                
                if (isFilled) {
                    cell.classList.add('filled');
                    cell.textContent = buffer[i].toString(16).toUpperCase().padStart(2, '0');
                } else {
                    cell.textContent = '--';
                }
                
                if (i === head) cell.classList.add('head');
                if (i === tail) cell.classList.add('tail');
            }
            
            document.getElementById('bufferUsed').textContent = count;
            document.getElementById('writeCount').textContent = writeCount;
            document.getElementById('readCount').textContent = readCount;
            document.getElementById('overflowCount').textContent = overflowCount;
            document.getElementById('bufferUsage').textContent = Math.round(count / BUFFER_SIZE * 100) + '%';
        }
        
        function writeToBuffer(data) {
            if (count >= BUFFER_SIZE) {
                overflowCount++;
                logToTerminal('txTerminal', `缓冲区已满，数据 0x${data.toString(16).toUpperCase().padStart(2, '0')} 丢失`);
                return false;
            }
            
            buffer[head] = data;
            head = (head + 1) % BUFFER_SIZE;
            count++;
            writeCount++;
            
            logToTerminal('txTerminal', `写入: 0x${data.toString(16).toUpperCase().padStart(2, '0')} ('${String.fromCharCode(data)}')`);
            updateBufferDisplay();
            
            return true;
        }
        
        function readFromBuffer() {
            if (count === 0) {
                logToTerminal('rxTerminal', '缓冲区为空');
                return -1;
            }
            
            const data = buffer[tail];
            tail = (tail + 1) % BUFFER_SIZE;
            count--;
            readCount++;
            
            logToTerminal('rxTerminal', `读取: 0x${data.toString(16).toUpperCase().padStart(2, '0')} ('${String.fromCharCode(data)}')`);
            updateBufferDisplay();
            
            return data;
        }
        
        function clearBuffer() {
            head = 0;
            tail = 0;
            count = 0;
            buffer = new Array(BUFFER_SIZE).fill(0);
            updateBufferDisplay();
            logToTerminal('txTerminal', '缓冲区已清空');
        }
        
        function writeRandomByte() {
            const data = Math.floor(Math.random() * 256);
            writeToBuffer(data);
        }
        
        function logToTerminal(terminalId, message) {
            const terminal = document.getElementById(terminalId);
            const line = document.createElement('div');
            const timestamp = new Date().toLocaleTimeString();
            
            line.textContent = `[${timestamp}] ${message}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
            
            while (terminal.children.length > 50) {
                terminal.removeChild(terminal.firstChild);
            }
        }
        
        function sendData() {
            const input = document.getElementById('txInput');
            const data = input.value;
            
            if (!data) return;
            
            logToTerminal('txTerminal', `发送: "${data}"`);
            
            for (let i = 0; i < data.length; i++) {
                writeToBuffer(data.charCodeAt(i));
            }
            
            setTimeout(() => {
                logToTerminal('rxTerminal', `接收: "${data}"`);
                while (count > 0) {
                    readFromBuffer();
                }
            }, 100);
            
            input.value = '';
        }
        
        initBufferDisplay();
        
        // 自动演示
        let autoDemoInterval = null;
        const demoData = [0x48, 0x65, 0x6C, 0x6C, 0x6F]; // "Hello"
        let demoIndex = 0;
        
        function autoDemo() {
            if (autoDemoInterval) return;
            
            autoDemoInterval = setInterval(() => {
                if (count < BUFFER_SIZE) {
                    writeToBuffer(demoData[demoIndex % demoData.length]);
                    demoIndex++;
                } else {
                    readFromBuffer();
                }
            }, 600);
        }
        
        autoDemo();
    </script>
</body>
</html>
