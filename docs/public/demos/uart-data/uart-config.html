<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>串口配置参数</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .container { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 2%; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #333; margin-bottom: 1%; font-size: clamp(14px, 2vw, 24px); }
        .mode-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 1%; }
        .mode-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .mode-dot.active { background: #333; transform: scale(1.2); }
        .cards { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 1.5%; }
        .card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 12px; padding: 2%; flex: 1; display: flex; flex-direction: column; }
        .card h3 { font-size: clamp(12px, 1.3vw, 14px); color: #666; margin-bottom: 1.5%; font-weight: 500; }
        .param-table { width: 100%; border-collapse: collapse; font-size: clamp(11px, 1.2vw, 13px); flex: 1; }
        .param-table th, .param-table td { padding: 1%; text-align: left; border-bottom: 1px solid #eee; }
        .param-table th { background: #fafafa; font-weight: 500; color: #666; }
        .param-value { font-family: 'Monaco', 'Consolas', monospace; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
        .timing-diagram { background: #fafafa; border-radius: 8px; padding: 2%; flex: 1; display: flex; flex-direction: column; }
        .timing-row { display: flex; align-items: center; flex: 1; font-family: 'Monaco', 'Consolas', monospace; font-size: clamp(10px, 1.1vw, 12px); }
        .timing-label { width: clamp(60px, 10%, 80px); font-weight: 500; color: #666; }
        .timing-signal { flex: 1; height: 100%; background: white; position: relative; border-radius: 4px; overflow: hidden; }
        .timing-bit { position: absolute; top: 0; height: 100%; transition: all 0.3s ease; }
        .timing-bit.high { background: #666; }
        .timing-bit.low { background: #ccc; }
        .timing-bit.start { background: #999; }
        .timing-bit.stop { background: #333; }
        .timing-labels { display: flex; justify-content: space-between; margin-top: 1%; font-size: clamp(9px, 1vw, 11px); color: #999; }
        .explanation { padding: 1.5%; background: #fff; border-left: 4px solid #333; border-radius: 0 8px 8px 0; margin-top: 1%; }
        .explanation h3 { color: #333; margin-bottom: 0.5%; font-size: clamp(12px, 1.3vw, 14px); }
        .explanation p { color: #666; font-size: clamp(10px, 1.2vw, 13px); line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>串口配置参数</h1>
        <div class="mode-indicator" id="modeIndicator"></div>
        <div class="cards">
            <div class="card">
                <h3>参数配置</h3>
                <table class="param-table">
                    <thead><tr><th>参数</th><th>值</th><th>说明</th></tr></thead>
                    <tbody>
                        <tr><td>波特率</td><td><span class="param-value" id="baudValue">115200</span></td><td>每秒传输的比特数</td></tr>
                        <tr><td>位时间</td><td><span class="param-value" id="bitTime">8.68 μs</span></td><td>传输一个比特所需时间</td></tr>
                        <tr><td>帧长度</td><td><span class="param-value" id="frameBits">10 bits</span></td><td>起始位 + 数据位 + 停止位</td></tr>
                        <tr><td>字节传输时间</td><td><span class="param-value" id="byteTime">86.8 μs</span></td><td>传输一个字节所需时间</td></tr>
                        <tr><td>理论吞吐量</td><td><span class="param-value" id="throughput">11520 B/s</span></td><td>每秒传输的字节数</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="card">
                <h3>数据帧时序图</h3>
                <div class="timing-diagram">
                    <div class="timing-row">
                        <div class="timing-label">数据帧</div>
                        <div class="timing-signal" id="timingSignal"></div>
                    </div>
                    <div class="timing-labels">
                        <span>← 起始位</span>
                        <span>数据位 (D0-D7) →</span>
                        <span>停止位 →</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="explanation" id="explanation"><h3>串口通信要点</h3><p>空闲状态 TX 线保持高电平，起始位为 1 位低电平标志帧开始，数据位 5~8 位低位先发，停止位 1~2 位高电平标志帧结束。</p></div>
    </div>
    <script>
        const configs = [
            { baud: 9600, dataBits: 8, stopBits: 1, parity: 'none', desc: '波特率 9600：早期串口标准速率，适用于低速设备通信。' },
            { baud: 115200, dataBits: 8, stopBits: 1, parity: 'none', desc: '波特率 115200：常用高速率，适用于大多数嵌入式设备。' },
            { baud: 115200, dataBits: 8, stopBits: 1, parity: 'even', desc: '偶校验：添加校验位检测传输错误，提高可靠性。' },
            { baud: 921600, dataBits: 8, stopBits: 1, parity: 'none', desc: '波特率 921600：高速率，适用于高速数据传输场景。' }
        ];
        let currentIdx = 0;
        function initIndicator() {
            const indicator = document.getElementById('modeIndicator');
            configs.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'mode-dot' + (i === 0 ? ' active' : '');
                indicator.appendChild(dot);
            });
        }
        function updateTiming() {
            const config = configs[currentIdx];
            const baud = config.baud;
            const dataBits = config.dataBits;
            const stopBits = config.stopBits;
            const parity = config.parity;
            const bitTime = 1000000 / baud;
            const parityBits = parity === 'none' ? 0 : 1;
            const frameBits = 1 + dataBits + parityBits + stopBits;
            const byteTime = bitTime * frameBits;
            const throughput = baud / frameBits;
            document.getElementById('baudValue').textContent = baud;
            document.getElementById('bitTime').textContent = bitTime.toFixed(2) + ' μs';
            document.getElementById('frameBits').textContent = frameBits + ' bits';
            document.getElementById('byteTime').textContent = byteTime.toFixed(2) + ' μs';
            document.getElementById('throughput').textContent = Math.round(throughput) + ' B/s';
            updateTimingDiagram(dataBits, parityBits, stopBits);
            document.getElementById('explanation').innerHTML = `<h3>串口通信要点</h3><p>${config.desc}</p>`;
            document.querySelectorAll('.mode-dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
        }
        function updateTimingDiagram(dataBits, parityBits, stopBits) {
            const signal = document.getElementById('timingSignal');
            signal.innerHTML = '';
            const totalBits = 1 + dataBits + parityBits + stopBits;
            const bitWidth = 100 / totalBits;
            let pos = 0;
            const startBit = document.createElement('div');
            startBit.className = 'timing-bit start';
            startBit.style.left = pos + '%';
            startBit.style.width = bitWidth + '%';
            signal.appendChild(startBit);
            pos += bitWidth;
            for (let i = 0; i < dataBits; i++) {
                const dataBit = document.createElement('div');
                dataBit.className = 'timing-bit ' + (Math.random() > 0.5 ? 'high' : 'low');
                dataBit.style.left = pos + '%';
                dataBit.style.width = bitWidth + '%';
                signal.appendChild(dataBit);
                pos += bitWidth;
            }
            if (parityBits > 0) {
                const parityBit = document.createElement('div');
                parityBit.className = 'timing-bit high';
                parityBit.style.left = pos + '%';
                parityBit.style.width = bitWidth + '%';
                signal.appendChild(parityBit);
                pos += bitWidth;
            }
            for (let i = 0; i < stopBits; i++) {
                const stopBit = document.createElement('div');
                stopBit.className = 'timing-bit stop';
                stopBit.style.left = pos + '%';
                stopBit.style.width = bitWidth + '%';
                signal.appendChild(stopBit);
                pos += bitWidth;
            }
        }
        initIndicator();
        updateTiming();
        setInterval(() => { currentIdx = (currentIdx + 1) % configs.length; updateTiming(); }, 3000);
    </script>
</body>
</html>
