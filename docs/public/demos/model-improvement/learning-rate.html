<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习率可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 16px; padding: 2%; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #333; margin-bottom: 1%; font-size: clamp(14px, 2vw, 24px); }
        .mode-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 1%; }
        .mode-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: all 0.3s; }
        .mode-dot.active { background: #333; transform: scale(1.2); }
        .legend { display: flex; justify-content: center; gap: 1.5%; margin-bottom: 1%; flex-wrap: wrap; font-size: clamp(10px, 1.1vw, 12px); }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-color { width: clamp(12px, 1.5vw, 16px); height: clamp(12px, 1.5vw, 16px); border-radius: 4px; }
        .canvas-container { flex: 1; min-height: 0; background: white; border-radius: 8px; padding: 1%; margin-bottom: 1%; }
        canvas { width: 100%; height: 100%; display: block; }
        .stats-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1%; margin-bottom: 1%; }
        @media (max-width: 600px) { .stats-panel { grid-template-columns: repeat(2, 1fr); } }
        .stat-item { background: #f8f9fa; padding: 1.5%; border-radius: 8px; text-align: center; border-left: 3px solid #333; }
        .stat-item.good { border-left-color: #2ecc71; }
        .stat-item.warning { border-left-color: #f39c12; }
        .stat-item.bad { border-left-color: #e74c3c; }
        .stat-value { font-size: clamp(14px, 1.8vw, 20px); font-weight: bold; color: #333; font-family: 'Courier New', monospace; }
        .stat-label { font-size: clamp(9px, 1vw, 11px); color: #666; margin-top: 0.5%; }
        .explanation { padding: 1.5%; background: #fff; border-left: 4px solid #333; border-radius: 0 8px 8px 0; }
        .explanation h3 { color: #333; margin-bottom: 0.5%; font-size: clamp(12px, 1.3vw, 14px); }
        .explanation p { color: #666; font-size: clamp(10px, 1.2vw, 13px); line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>学习率可视化</h1>
        <div class="mode-indicator" id="modeIndicator"></div>
        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background: #2ecc71;"></div><span>最优学习率</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #3498db;"></div><span>学习率过小</span></div>
            <div class="legend-item"><div class="legend-color" style="background: #e74c3c;"></div><span>学习率过大</span></div>
        </div>
        <div class="canvas-container"><canvas id="lossCanvas"></canvas></div>
        <div class="stats-panel">
            <div class="stat-item" id="statIter"><div class="stat-value" id="currentIter">0</div><div class="stat-label">当前迭代</div></div>
            <div class="stat-item" id="statX"><div class="stat-value" id="currentX">3.0</div><div class="stat-label">当前参数 x</div></div>
            <div class="stat-item" id="statLoss"><div class="stat-value" id="currentLoss">9.0</div><div class="stat-label">当前损失</div></div>
            <div class="stat-item" id="statGrad"><div class="stat-value" id="currentGrad">6.0</div><div class="stat-label">当前梯度</div></div>
        </div>
        <div class="explanation" id="explanation"><h3>学习率对比演示</h3><p>自动演示三种学习率的效果：η=0.01 收敛缓慢，η=0.1 收敛适中，η=1.0 震荡发散。选择合适的学习率是训练神经网络的关键。</p></div>
    </div>
    <script>
        const canvas = document.getElementById('lossCanvas');
        const ctx = canvas.getContext('2d');
        const modes = [
            { lr: 0.01, color: '#3498db', name: '学习率过小 (η=0.01)', desc: '收敛缓慢，需要大量迭代才能到达最优解。训练时间长，效率低。' },
            { lr: 0.1, color: '#2ecc71', name: '最优学习率 (η=0.1)', desc: '收敛速度适中，稳定到达最优解。这是理想的学习率设置。' },
            { lr: 1.0, color: '#e74c3c', name: '学习率过大 (η=1.0)', desc: '步长过大，导致震荡甚至发散，无法收敛到最优解。' }
        ];
        let currentModeIdx = 0;
        let trajectories = [];
        let animationFrame = 0;
        function initIndicator() {
            const indicator = document.getElementById('modeIndicator');
            modes.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'mode-dot' + (i === 0 ? ' active' : '');
                indicator.appendChild(dot);
            });
        }
        function lossFunction(x) { return x * x; }
        function gradient(x) { return 2 * x; }
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }
        function computeTrajectory(lr, steps = 50) {
            let x = 3.0;
            const traj = [{ x, loss: lossFunction(x) }];
            for (let i = 0; i < steps; i++) {
                const grad = gradient(x);
                x = x - lr * grad;
                if (Math.abs(x) > 10) break;
                traj.push({ x, loss: lossFunction(x) });
            }
            return traj;
        }
        function draw() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(0, 0, width, height);
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            for (let x = -4; x <= 4; x++) {
                const screenX = (x + 4) / 8 * width;
                ctx.beginPath(); ctx.moveTo(screenX, 0); ctx.lineTo(screenX, height); ctx.stroke();
            }
            for (let y = 0; y <= 10; y++) {
                const screenY = height - (y / 10 * height * 0.9 + height * 0.05);
                ctx.beginPath(); ctx.moveTo(0, screenY); ctx.lineTo(width, screenY); ctx.stroke();
            }
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i <= width; i++) {
                const x = (i / width) * 8 - 4;
                const y = lossFunction(x);
                const screenY = height - (y / 10 * height * 0.9 + height * 0.05);
                if (i === 0) ctx.moveTo(i, screenY); else ctx.lineTo(i, screenY);
            }
            ctx.stroke();
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.arc(width / 2, height - height * 0.05, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.font = 'clamp(10px, 1.2vw, 12px) sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('最优解 (x=0)', width / 2, height - height * 0.05 + 20);
            trajectories.forEach((traj, idx) => {
                const mode = modes[idx];
                const pointsToShow = Math.min(traj.length, animationFrame);
                if (pointsToShow < 2) return;
                ctx.strokeStyle = mode.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < pointsToShow; i++) {
                    const point = traj[i];
                    const screenX = (point.x + 4) / 8 * width;
                    const screenY = height - (point.loss / 10 * height * 0.9 + height * 0.05);
                    if (i === 0) ctx.moveTo(screenX, screenY); else ctx.lineTo(screenX, screenY);
                }
                ctx.stroke();
                for (let i = 0; i < pointsToShow; i++) {
                    const point = traj[i];
                    const screenX = (point.x + 4) / 8 * width;
                    const screenY = height - (point.loss / 10 * height * 0.9 + height * 0.05);
                    ctx.fillStyle = mode.color;
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, i === pointsToShow - 1 ? 6 : 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        function updateStats() {
            const mode = modes[currentModeIdx];
            const traj = trajectories[currentModeIdx];
            const idx = Math.min(animationFrame - 1, traj.length - 1);
            if (idx >= 0) {
                const point = traj[idx];
                document.getElementById('currentIter').textContent = idx;
                document.getElementById('currentX').textContent = point.x.toFixed(3);
                document.getElementById('currentLoss').textContent = point.loss.toFixed(3);
                document.getElementById('currentGrad').textContent = gradient(point.x).toFixed(3);
            }
            document.getElementById('explanation').innerHTML = `<h3>${mode.name}</h3><p>${mode.desc}</p>`;
            document.querySelectorAll('.mode-dot').forEach((dot, i) => dot.classList.toggle('active', i === currentModeIdx));
        }
        function animate() {
            const maxFrames = 60;
            if (animationFrame < maxFrames) {
                animationFrame++;
                draw();
                updateStats();
            } else {
                animationFrame = 0;
                currentModeIdx = (currentModeIdx + 1) % modes.length;
                trajectories = modes.map(m => computeTrajectory(m.lr));
            }
            setTimeout(() => requestAnimationFrame(animate), 100);
        }
        initIndicator();
        trajectories = modes.map(m => computeTrajectory(m.lr));
        window.addEventListener('load', () => { resizeCanvas(); animate(); });
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
