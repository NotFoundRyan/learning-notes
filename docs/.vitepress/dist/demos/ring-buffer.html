<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环形缓冲区演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100%;
            padding: 20px;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #4fc3f7;
            font-size: 18px;
        }
        
        .ring-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 20px;
        }
        
        .ring-svg {
            width: 100%;
            height: 100%;
        }
        
        .cell {
            fill: #2d3748;
            stroke: #4a5568;
            stroke-width: 1;
            cursor: pointer;
            transition: fill 0.3s ease;
        }
        
        .cell.filled {
            fill: #48bb78;
        }
        
        .cell.head {
            stroke: #f56565;
            stroke-width: 3;
        }
        
        .cell.tail {
            stroke: #4299e1;
            stroke-width: 3;
        }
        
        .cell.head.tail {
            stroke: #9f7aea;
            stroke-width: 3;
        }
        
        .cell-text {
            font-size: 10px;
            fill: #a0aec0;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }
        
        .cell.filled + .cell-text {
            fill: white;
        }
        
        .pointer-label {
            font-size: 12px;
            font-weight: bold;
            text-anchor: middle;
        }
        
        .head-label { fill: #f56565; }
        .tail-label { fill: #4299e1; }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn-write {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }
        
        .btn-write:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }
        
        .btn-read {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
        }
        
        .btn-read:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(66, 153, 225, 0.4);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #718096, #4a5568);
            color: white;
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(113, 128, 150, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        .status {
            background: rgba(45, 55, 72, 0.8);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .status-row:last-child {
            margin-bottom: 0;
        }
        
        .status-label {
            color: #a0aec0;
        }
        
        .status-value {
            font-weight: 600;
            font-family: 'Monaco', 'Consolas', monospace;
        }
        
        .status-value.head { color: #f56565; }
        .status-value.tail { color: #4299e1; }
        .status-value.count { color: #48bb78; }
        
        .state-badge {
            text-align: center;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .state-empty {
            background: rgba(66, 153, 225, 0.2);
            color: #4299e1;
        }
        
        .state-full {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }
        
        .state-normal {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            margin-top: 16px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        
        .legend-dot.head { background: #f56565; }
        .legend-dot.tail { background: #4299e1; }
        .legend-dot.filled { background: #48bb78; }
        
        .linear-view {
            background: rgba(45, 55, 72, 0.6);
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
        }
        
        .linear-view-title {
            font-size: 12px;
            color: #a0aec0;
            margin-bottom: 8px;
        }
        
        .linear-cells {
            display: flex;
            gap: 2px;
        }
        
        .linear-cell {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border-radius: 4px;
            background: #2d3748;
            color: #a0aec0;
        }
        
        .linear-cell.filled {
            background: #48bb78;
            color: white;
        }
        
        .linear-cell.head {
            border: 2px solid #f56565;
        }
        
        .linear-cell.tail {
            border: 2px solid #4299e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>环形缓冲区可视化</h2>
        
        <div class="ring-container">
            <svg class="ring-svg" viewBox="0 0 300 300" id="ringSvg"></svg>
        </div>
        
        <div class="controls">
            <button class="btn btn-write" id="writeBtn" onclick="writeData()">写入数据</button>
            <button class="btn btn-read" id="readBtn" onclick="readData()">读取数据</button>
            <button class="btn btn-reset" onclick="reset()">重置</button>
        </div>
        
        <div class="status">
            <div class="status-row">
                <span class="status-label">写指针</span>
                <span class="status-value head" id="headValue">0</span>
            </div>
            <div class="status-row">
                <span class="status-label">读指针</span>
                <span class="status-value tail" id="tailValue">0</span>
            </div>
            <div class="status-row">
                <span class="status-label">数据量</span>
                <span class="status-value count" id="countValue">0 / 8</span>
            </div>
            <div class="status-row">
                <span class="status-label">状态</span>
                <span class="state-badge state-empty" id="stateBadge">空</span>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot head"></div>
                <span>写指针</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot tail"></div>
                <span>读指针</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot filled"></div>
                <span>已写入</span>
            </div>
        </div>
        
        <div class="linear-view">
            <div class="linear-view-title">线性视图（内存实际布局）</div>
            <div class="linear-cells" id="linearCells"></div>
        </div>
    </div>

    <script>
        const SIZE = 8;
        const RADIUS = 100;
        const CENTER = 150;
        const CELL_SIZE = 36;
        
        let buffer = new Array(SIZE).fill(null);
        let head = 0;
        let tail = 0;
        let dataCounter = 1;
        
        function init() {
            const svg = document.getElementById('ringSvg');
            svg.innerHTML = '';
            
            for (let i = 0; i < SIZE; i++) {
                const angle = (i * 360 / SIZE - 90) * Math.PI / 180;
                const x = CENTER + RADIUS * Math.cos(angle);
                const y = CENTER + RADIUS * Math.sin(angle);
                
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('class', 'cell');
                rect.setAttribute('id', `cell-${i}`);
                rect.setAttribute('x', x - CELL_SIZE/2);
                rect.setAttribute('y', y - CELL_SIZE/2);
                rect.setAttribute('width', CELL_SIZE);
                rect.setAttribute('height', CELL_SIZE);
                rect.setAttribute('rx', 6);
                svg.appendChild(rect);
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('class', 'cell-text');
                text.setAttribute('id', `text-${i}`);
                text.setAttribute('x', x);
                text.setAttribute('y', y);
                text.textContent = i;
                svg.appendChild(text);
            }
            
            const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            centerText.setAttribute('x', CENTER);
            centerText.setAttribute('y', CENTER);
            centerText.setAttribute('text-anchor', 'middle');
            centerText.setAttribute('dominant-baseline', 'middle');
            centerText.setAttribute('fill', '#4fc3f7');
            centerText.setAttribute('font-size', '14');
            centerText.setAttribute('font-weight', 'bold');
            centerText.textContent = 'Ring Buffer';
            svg.appendChild(centerText);
            
            initLinearView();
            updateDisplay();
        }
        
        function initLinearView() {
            const container = document.getElementById('linearCells');
            container.innerHTML = '';
            for (let i = 0; i < SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'linear-cell';
                cell.id = `linear-cell-${i}`;
                cell.textContent = i;
                container.appendChild(cell);
            }
        }
        
        function updateDisplay() {
            for (let i = 0; i < SIZE; i++) {
                const cell = document.getElementById(`cell-${i}`);
                const text = document.getElementById(`text-${i}`);
                const linearCell = document.getElementById(`linear-cell-${i}`);
                
                let classes = ['cell'];
                let linearClasses = ['linear-cell'];
                
                if (buffer[i] !== null) {
                    classes.push('filled');
                    linearClasses.push('filled');
                    text.textContent = buffer[i];
                    linearCell.textContent = buffer[i];
                } else {
                    text.textContent = i;
                    linearCell.textContent = i;
                }
                
                if (i === head) classes.push('head');
                if (i === tail) classes.push('tail');
                if (i === head) linearClasses.push('head');
                if (i === tail) linearClasses.push('tail');
                
                cell.setAttribute('class', classes.join(' '));
                linearCell.className = linearClasses.join(' ');
            }
            
            document.getElementById('headValue').textContent = head;
            document.getElementById('tailValue').textContent = tail;
            
            const count = (head - tail + SIZE) % SIZE;
            document.getElementById('countValue').textContent = `${count} / ${SIZE}`;
            
            const stateBadge = document.getElementById('stateBadge');
            const writeBtn = document.getElementById('writeBtn');
            const readBtn = document.getElementById('readBtn');
            
            if (count === 0) {
                stateBadge.textContent = '空';
                stateBadge.className = 'state-badge state-empty';
                readBtn.disabled = true;
            } else if (count === SIZE - 1) {
                stateBadge.textContent = '满';
                stateBadge.className = 'state-badge state-full';
                writeBtn.disabled = true;
            } else {
                stateBadge.textContent = '正常';
                stateBadge.className = 'state-badge state-normal';
                writeBtn.disabled = false;
                readBtn.disabled = false;
            }
        }
        
        function writeData() {
            const next = (head + 1) % SIZE;
            if (next === tail) return;
            
            buffer[head] = 'D' + dataCounter++;
            head = next;
            updateDisplay();
        }
        
        function readData() {
            if (head === tail) return;
            
            buffer[tail] = null;
            tail = (tail + 1) % SIZE;
            updateDisplay();
        }
        
        function reset() {
            buffer = new Array(SIZE).fill(null);
            head = 0;
            tail = 0;
            dataCounter = 1;
            updateDisplay();
        }
        
        init();
    </script>
</body>
</html>
