<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位运算取模演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100%;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            font-weight: 500;
        }
        
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .input-group label {
            font-size: 11px;
            color: #666;
        }
        
        .input-group input,
        .input-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            width: 120px;
            background: white;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #999;
        }
        
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .method-box {
            background: #fafafa;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .method-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .method-expression {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 18px;
            margin-bottom: 16px;
            padding: 12px;
            background: white;
            border-radius: 6px;
        }
        
        .method-result {
            font-size: 32px;
            font-weight: 600;
            color: #333;
        }
        
        .method-result.correct {
            color: #333;
        }
        
        .method-result.incorrect {
            color: #999;
            text-decoration: line-through;
        }
        
        .binary-visual {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .binary-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
        }
        
        .binary-label {
            width: 80px;
            color: #666;
        }
        
        .binary-bits {
            display: flex;
            gap: 2px;
        }
        
        .bit {
            width: 20px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8e8e8;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .bit.highlight {
            background: #333;
            color: white;
        }
        
        .bit.masked {
            background: #ccc;
            color: #999;
        }
        
        .info-box {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
        }
        
        .info-value {
            font-weight: 500;
        }
        
        .size-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .size-option {
            padding: 8px 16px;
            background: #e8e8e8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        
        .size-option:hover {
            background: #ddd;
        }
        
        .size-option.active {
            background: #333;
            color: white;
        }
        
        .note {
            font-size: 12px;
            color: #666;
            background: #fafafa;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #999;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>位运算取模演示</h2>
        
        <div class="card">
            <h3>缓冲区大小选择</h3>
            <div class="size-selector">
                <div class="size-option active" onclick="setSize(8)" id="size8">8 (2³)</div>
                <div class="size-option" onclick="setSize(16)" id="size16">16 (2⁴)</div>
                <div class="size-option" onclick="setSize(32)" id="size32">32 (2⁵)</div>
                <div class="size-option" onclick="setSize(64)" id="size64">64 (2⁶)</div>
            </div>
            
            <div class="input-row">
                <div class="input-group">
                    <label>输入值 (index)</label>
                    <input type="number" id="inputValue" value="17" min="0" oninput="calculate()">
                </div>
            </div>
            
            <div class="comparison">
                <div class="method-box">
                    <div class="method-title">传统取模运算</div>
                    <div class="method-expression" id="modExpr">17 % 8</div>
                    <div class="method-result" id="modResult">1</div>
                </div>
                <div class="method-box">
                    <div class="method-title">位运算取模</div>
                    <div class="method-expression" id="bitExpr">17 & 7</div>
                    <div class="method-result" id="bitResult">1</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>二进制可视化</h3>
            <div class="binary-visual">
                <div class="binary-row">
                    <span class="binary-label">输入值</span>
                    <div class="binary-bits" id="inputBits"></div>
                    <span style="margin-left: 10px; color: #666;" id="inputDec">= 17</span>
                </div>
                <div class="binary-row">
                    <span class="binary-label">掩码值</span>
                    <div class="binary-bits" id="maskBits"></div>
                    <span style="margin-left: 10px; color: #666;" id="maskDec">= 7</span>
                </div>
                <div class="binary-row" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #ddd;">
                    <span class="binary-label">结果</span>
                    <div class="binary-bits" id="resultBits"></div>
                    <span style="margin-left: 10px; color: #333; font-weight: 500;" id="resultDec">= 1</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>原理说明</h3>
            <div class="info-box">
                <div class="info-row">
                    <span class="info-label">缓冲区大小</span>
                    <span class="info-value" id="bufferSize">8</span>
                </div>
                <div class="info-row">
                    <span class="info-label">掩码值 (size - 1)</span>
                    <span class="info-value" id="maskValue">7</span>
                </div>
                <div class="info-row">
                    <span class="info-label">二进制掩码</span>
                    <span class="info-value" id="maskBinary">0b111</span>
                </div>
                <div class="info-row">
                    <span class="info-label">等价关系</span>
                    <span class="info-value">index % size ≡ index & (size - 1)</span>
                </div>
            </div>
            
            <div class="note">
                <strong>适用条件：</strong>缓冲区大小必须是 2 的幂次方 (2, 4, 8, 16, 32...)。<br>
                <strong>性能优势：</strong>位运算比除法/取模运算快 3-10 倍。
            </div>
        </div>
    </div>

    <script>
        let bufferSize = 8;
        
        function setSize(size) {
            bufferSize = size;
            document.querySelectorAll('.size-option').forEach(el => el.classList.remove('active'));
            document.getElementById('size' + size).classList.add('active');
            calculate();
        }
        
        function calculate() {
            const input = parseInt(document.getElementById('inputValue').value) || 0;
            const mask = bufferSize - 1;
            
            const modResult = input % bufferSize;
            const bitResult = input & mask;
            
            document.getElementById('modExpr').textContent = `${input} % ${bufferSize}`;
            document.getElementById('modResult').textContent = modResult;
            document.getElementById('modResult').className = 'method-result correct';
            
            document.getElementById('bitExpr').textContent = `${input} & ${mask}`;
            document.getElementById('bitResult').textContent = bitResult;
            document.getElementById('bitResult').className = 'method-result ' + (modResult === bitResult ? 'correct' : 'incorrect');
            
            renderBinary('inputBits', input, 8, []);
            renderBinary('maskBits', mask, 8, []);
            renderBinary('resultBits', bitResult, 8, []);
            
            document.getElementById('inputDec').textContent = `= ${input}`;
            document.getElementById('maskDec').textContent = `= ${mask}`;
            document.getElementById('resultDec').textContent = `= ${bitResult}`;
            
            document.getElementById('bufferSize').textContent = bufferSize;
            document.getElementById('maskValue').textContent = mask;
            document.getElementById('maskBinary').textContent = '0b' + mask.toString(2);
        }
        
        function renderBinary(containerId, value, bits, highlights) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const binary = value.toString(2).padStart(bits, '0');
            
            for (let i = 0; i < binary.length; i++) {
                const bit = document.createElement('div');
                bit.className = 'bit';
                if (highlights.includes(i)) {
                    bit.classList.add('highlight');
                }
                bit.textContent = binary[i];
                container.appendChild(bit);
            }
        }
        
        calculate();
    </script>
</body>
</html>
